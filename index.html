  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: #060b18;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }
    @keyframes spinRing {
      to { transform: rotate(360deg); }
    }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(99,102,241,0.45); }
      50%       { box-shadow: 0 0 0 14px rgba(99,102,241,0); }
    }
    @keyframes bgShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes cardPop {
      0%   { opacity: 0; transform: scale(0.94) translateY(10px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .anim-fadeUp  { animation: fadeUp  0.35s cubic-bezier(.22,.68,0,1.2) both; }
    .anim-fadeIn  { animation: fadeIn  0.25s ease both; }
    .anim-cardPop { animation: cardPop 0.3s cubic-bezier(.22,.68,0,1.2) both; }

    /* Stagger helpers */
    .delay-1 { animation-delay: .06s; }
    .delay-2 { animation-delay: .12s; }
    .delay-3 { animation-delay: .18s; }
    .delay-4 { animation-delay: .24s; }
    .delay-5 { animation-delay: .30s; }

    /* ── Glassmorphism ── */
    .glass {
      background: rgba(255,255,255,0.055);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border: 1px solid rgba(255,255,255,0.09);
    }
    .glass-strong {
      background: rgba(255,255,255,0.09);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.14);
    }

    /* ── Gradient text ── */
    .grad-text {
      background: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 50%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Progress bar ── */
    .progress-fill {
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      border-radius: 999px;
      transition: width 0.45s cubic-bezier(.22,.68,0,1.2);
    }
    .progress-fill-red {
      background: linear-gradient(90deg, #ef4444, #dc2626);
      border-radius: 999px;
      transition: width 0.45s cubic-bezier(.22,.68,0,1.2);
    }
    .progress-fill-green {
      background: linear-gradient(90deg, #10b981, #059669);
      border-radius: 999px;
      transition: width 0.45s cubic-bezier(.22,.68,0,1.2);
    }

    /* ── Buttons ── */
    .btn-press {
      transition: transform 130ms ease, box-shadow 130ms ease, opacity 130ms ease;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-press:hover  { transform: translateY(-1px); }
    .btn-press:active { transform: scale(0.96); }

    /* ── Spinner ── */
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(255,255,255,0.12);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spinRing 0.8s linear infinite;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

    /* ── Card flip ── */
    .flip-card-inner {
      transition: transform 0.55s cubic-bezier(.175,.885,.32,1.275);
      transform-style: preserve-3d;
    }
    .flip-card-inner.flipped { transform: rotateY(180deg); }
    .flip-card-face {
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    .flip-card-back {
      transform: rotateY(180deg);
    }

    /* ── Checkbox custom ── */
    .cb-item {
      transition: background 150ms ease;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Mobile safe area ── */
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 16px); }
  </style>
</head>

// ─── SERVICE WORKER & NOTIFICATIONS ───
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
function scheduleNotification() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  navigator.serviceWorker.ready.then(reg => {
    const next9am = new Date();
    next9am.setDate(next9am.getDate() + 1);
    next9am.setHours(9, 0, 0, 0);
    reg.active?.postMessage({
      type: 'SCHEDULE',
      delay: next9am - new Date(),
      title: '📦 GéoFlash – Révision du jour',
      body: 'C\'est l\'heure de réviser ta boîte de Leitner !'
    });
  });
}
async function requestAndScheduleNotifications() {
  if (!('Notification' in window) || !('serviceWorker' in navigator)) return;
  if (Notification.permission === 'default') {
    await Notification.requestPermission();
  }
  scheduleNotification();
}

  {nom:"Anarchisme",definition:"Courant politique et philosophique qui rejette toute forme d'autorité contraignante — État, hiérarchie, domination — au profit d'une organisation sociale libre et volontaire fondée sur la coopération.",auteurs:"Proudhon, Bakounine, Kropotkine, Emma Goldman",periode:"XIXe–XXe s.",tags:["politique","société"]},

  {nom:"Empirisme",definition:"Courant épistémologique selon lequel toute connaissance provient de l'expérience sensible. L'esprit est une 'table rase' à la naissance ; c'est l'observation et l'expérience qui construisent nos idées.",auteurs:"Locke, Hume, Berkeley, Francis Bacon, J.S. Mill",periode:"XVIIe–XVIIIe s.",tags:["épistémologie","connaissance"]},
  {nom:"Épicurisme",definition:"Philosophie du bonheur fondée sur la recherche du plaisir modéré et l'absence de douleur (ataraxie). Le sage épicurien cultive les plaisirs simples, l'amitié et la sérénité face à la mort.",auteurs:"Épicure, Lucrèce",periode:"IVe s. av. J.-C.",tags:["éthique","bonheur","antique"]},
  {nom:"Existentialisme",definition:"Courant affirmant que l'existence précède l'essence : l'être humain n'a pas de nature fixée, il se définit par ses choix et ses actes. L'homme est condamné à être libre et pleinement responsable.",auteurs:"Sartre, Simone de Beauvoir, Camus, Heidegger, Kierkegaard",periode:"XIXe–XXe s.",tags:["liberté","existence"]},
  {nom:"Féminisme",definition:"Mouvement philosophique et politique qui défend l'égalité des droits entre les sexes, analyse et combat les structures de domination patriarcale, et repense les catégories de genre et de pouvoir.",auteurs:"Simone de Beauvoir, Mary Wollstonecraft, Judith Butler, Olympe de Gouges",periode:"XVIIIe s. – présent",tags:["politique","genre"]},
  {nom:"Humanisme",definition:"Courant de la Renaissance plaçant l'être humain au centre de la réflexion, valorisant les lettres antiques, la raison, la dignité humaine et la curiosité intellectuelle contre le dogmatisme médiéval.",auteurs:"Érasme, Montaigne, Pico della Mirandola, Thomas More, Rabelais",periode:"XVe–XVIe s.",tags:["Renaissance","dignité"]},
  {nom:"Idéalisme",definition:"Doctrine selon laquelle la réalité est fondamentalement d'ordre mental ou spirituel. L'esprit, les idées ou la conscience sont premiers ; le monde matériel n'existe que dans et par la représentation.",auteurs:"Platon, Kant, Hegel, Fichte, Berkeley",periode:"Antiquité – XIXe s.",tags:["métaphysique","connaissance"]},
  {nom:"Libéralisme",definition:"Philosophie politique valorisant la liberté individuelle, les droits naturels, l'État de droit et l'économie de marché. L'État doit être limité afin de garantir les libertés civiles et politiques des individus.",auteurs:"Locke, Adam Smith, J.S. Mill, Tocqueville, Montesquieu",periode:"XVIIe–XIXe s.",tags:["politique","liberté"]},

  {nom:"Marxisme",definition:"Théorie sociale, économique et politique fondée sur l'analyse matérialiste de l'histoire, la lutte des classes et la critique du capitalisme, visant l'émancipation du prolétariat.",auteurs:"Marx, Engels, Gramsci, Althusser, Lénine",periode:"XIXe–XXe s.",tags:["politique","économie"]},
  {nom:"Matérialisme",definition:"Doctrine métaphysique affirmant que seule la matière existe et que tous les phénomènes — y compris la pensée et la conscience — sont des manifestations de processus matériels.",auteurs:"Démocrite, Épicure, La Mettrie, Marx, Diderot",periode:"Antiquité – XIXe s.",tags:["métaphysique","ontologie"]},
  {nom:"Mécanisme",definition:"Conception selon laquelle la nature et les êtres vivants fonctionnent comme des machines, régis par des lois physiques et causales, sans finalité intrinsèque ni principe vital.",auteurs:"Descartes, Hobbes, La Mettrie, Galilée, Newton",periode:"XVIIe–XVIIIe s.",tags:["science","nature"]},
  {nom:"Phénoménologie",definition:"Méthode philosophique qui part de la description rigoureuse des phénomènes tels qu'ils apparaissent à la conscience, en suspendant les présupposés théoriques pour revenir aux choses mêmes.",auteurs:"Husserl, Heidegger, Merleau-Ponty, Sartre",periode:"XXe s.",tags:["conscience","méthode"]},
  {nom:"Platonisme",definition:"Philosophie fondée sur la théorie des Idées : le monde sensible n'est qu'une copie imparfaite du monde intelligible des Idées éternelles et parfaites, accessibles par la raison et la dialectique.",auteurs:"Platon, Plotin, Porphyre",periode:"IVe s. av. J.-C. – Ve s. ap. J.-C.",tags:["antique","métaphysique"]},
  {nom:"Positivisme",definition:"Courant affirmant que seule la connaissance scientifique, fondée sur l'observation et l'expérience vérifiable, est légitime. La philosophie doit s'aligner sur la méthode des sciences positives.",auteurs:"Auguste Comte, J.S. Mill, Ernst Mach",periode:"XIXe s.",tags:["science","épistémologie"]},

  {nom:"Rationalisme",definition:"Courant épistémologique selon lequel la raison est la source principale de la connaissance. Les vérités nécessaires sont connues a priori, indépendamment de l'expérience sensible.",auteurs:"Descartes, Spinoza, Leibniz, Kant",periode:"XVIIe–XVIIIe s.",tags:["épistémologie","raison"]},
  {nom:"Scepticisme",definition:"Attitude philosophique qui met en doute la possibilité d'atteindre une connaissance certaine. Le sceptique suspend son jugement ou relativise toute prétention à la vérité absolue.",auteurs:"Pyrrhon, Sextus Empiricus, Montaigne, Hume",periode:"IVe s. av. J.-C. – présent",tags:["épistémologie","doute"]},
  {nom:"Socialisme",definition:"Doctrine politique et économique prônant une organisation plus juste de la société par la maîtrise collective des moyens de production, la redistribution des richesses et la solidarité sociale.",auteurs:"Saint-Simon, Fourier, Proudhon, Jaurès, Marx",periode:"XIXe–XXe s.",tags:["politique","économie"]},
  {nom:"Stoïcisme",definition:"École philosophique enseignant que le bonheur réside dans la vertu et la maîtrise de soi. Le sage stoïcien accepte ce qui ne dépend pas de lui et cultive la raison et l'impassibilité.",auteurs:"Zénon de Kition, Épictète, Marc Aurèle, Sénèque",periode:"IVe s. av. J.-C. – IIe s. ap. J.-C.",tags:["antique","éthique","bonheur"]},
  {nom:"Structuralisme",definition:"Courant des sciences humaines analysant les phénomènes culturels et sociaux comme des systèmes de relations structurelles, en mettant l'accent sur les structures plutôt que sur les sujets.",auteurs:"Saussure, Lévi-Strauss, Althusser, Barthes, Lacan",periode:"XXe s.",tags:["langage","société"]},
  {nom:"Utilitarisme",definition:"Théorie éthique selon laquelle la valeur morale d'une action se mesure à ses conséquences : est bon ce qui maximise le bonheur ou l'utilité du plus grand nombre.",auteurs:"Bentham, J.S. Mill, Peter Singer, Sidgwick",periode:"XVIIIe–XIXe s.",tags:["éthique","politique"]},

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function normalize(s) { return s.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[-']/g," ").replace(/\s+/g," "); }
function isCorrect(i,a) { return normalize(i)===normalize(a); }

function getDeptCardFrontBack(card) {
  const d = card.dir;
  if (d==="num-to-nom")  return {front:card.num,  back:card.nom,  frontLabel:"Numéro",      backLabel:"Département"};
  if (d==="nom-to-num")  return {front:card.nom,  back:card.num,  frontLabel:"Département", backLabel:"Numéro"};
  if (d==="nom-to-chef") return {front:card.nom,  back:card.chef, frontLabel:"Département", backLabel:"Chef-lieu"};
  if (d==="chef-to-nom") return {front:card.chef, back:card.nom,  frontLabel:"Chef-lieu",   backLabel:"Département"};
  if (d==="num-to-chef") return {front:card.num,  back:card.chef, frontLabel:"Numéro",      backLabel:"Chef-lieu"};
  return {front:card.num, back:card.nom, frontLabel:"Numéro", backLabel:"Département"};
}
function getCapCardFrontBack(card) {
  if (card.dir==="pays-to-cap") return {front:card.pays,     back:card.capitale, frontLabel:"Pays",     backLabel:"Capitale"};
  return                               {front:card.capitale, back:card.pays,     frontLabel:"Capitale", backLabel:"Pays"};
}
function getHistCardFrontBack(card) {
  if (card.dir==="date-to-evt") return {front:card.date, back:card.evenement, frontLabel:"Date", backLabel:"Événement"};
  return                               {front:card.evenement, back:card.date, frontLabel:"Événement", backLabel:"Date"};
}
function resolveDeptDirs(subject, dir) {
  if (subject==="num-nom") { if (dir==="mixed") return ["num-to-nom","nom-to-num"]; return [dir]; }
  if (subject==="chef")    { if (dir==="mixed") return ["nom-to-chef","chef-to-nom","num-to-chef"]; return [dir]; }
  return ["num-to-nom"];
}

  {n:2,color:"#e67e22",desc:"Tous les 3 jours",intervalDays:3},
  {n:3,color:"#f1c40f",desc:"Toutes les semaines",intervalDays:7},
  {n:4,color:"#27ae60",desc:"Toutes les 2 semaines",intervalDays:14},
  {n:5,color:"#2980b9",desc:"Tous les mois",intervalDays:30},
];
function initLeitnerState() {
  const cards = {};
  LEITNER_CARDS.forEach(c => { cards[c.id] = {box:1, lastReviewedDate:null}; });
  return {cards, session:1, customCards:[]};
}
function initGuestLeitnerState() {
  return {cards:{}, session:1, customCards:[]};
}
function getLeitnerDueCards(state) {
  const today = new Date().toISOString().slice(0,10);
  const allCards = [...LEITNER_CARDS, ...(state.customCards||[])];
  return allCards.filter(c => {
    const s = state.cards[c.id];
    if (!s) return true;
    if (s.box === 0) return false;
    if (!s.lastReviewedDate) return true;
    const box = LEITNER_BOXES.find(b => b.n===s.box);
    const diffDays = Math.floor((new Date(today)-new Date(s.lastReviewedDate))/86400000);
    return diffDays >= box.intervalDays;
  });
}
function addCardsToLeitnerStorage(deck, configType) {
  let state;
  try { state = JSON.parse(localStorage.getItem("leitner_state"))||initLeitnerState(); }
  catch { state = initLeitnerState(); }
  const newState = {...state, cards:{...state.cards}, customCards:[...(state.customCards||[])]};
  const defaultIds = new Set(LEITNER_CARDS.map(c=>c.id));
  const existingCustomIds = new Set(newState.customCards.map(c=>c.id));
  const seen = new Set();
  let added = 0;
  deck.forEach(card => {
    let id, customCard;
    if (configType==='dept') {
      id = card.num;
      if (!defaultIds.has(id) && !existingCustomIds.has(id))
        customCard = {id, type:'dept', num:card.num, nom:card.nom, region:card.region};
    } else if (configType==='chef') {
      id = 'chef_'+card.num;
      if (!existingCustomIds.has(id))
        customCard = {id, type:'chef', num:card.num, nom:card.nom, chef:card.chef, region:card.region};
    } else if (configType==='cap') {
      id = 'cap_'+card.pays;
      if (!existingCustomIds.has(id))
        customCard = {id, type:'cap', pays:card.pays, capitale:card.capitale, continent:card.continent};
    } else if (configType==='philo') {
      id = 'philo_'+card.nom;
      if (!existingCustomIds.has(id))
        customCard = {id, type:'philo', nom:card.nom, definition:card.definition, auteurs:card.auteurs};
    } else if (configType==='hist') {
      id = card.id;
      if (!existingCustomIds.has(id))
        customCard = {id, type:'hist', date:card.date, evenement:card.evenement, periode:card.periode};
    } else if (configType==='figures') {
      id = 'figstyle_'+card.id;
      if (!existingCustomIds.has(id))
        customCard = {id, type:'figures', nom:card.nom, definition:card.definition, exemple:card.exemple, effet:card.effet, categorie:card.categorie};
    }
    if (id && !seen.has(id) && !newState.cards[id]) {
      const today = new Date().toISOString().slice(0,10);
      seen.add(id); newState.cards[id] = {box:0, lastReviewedDate:today};
      if (customCard) newState.customCards.push(customCard);
      added++;
    }
  });
  try { localStorage.setItem("leitner_state", JSON.stringify(newState)); } catch {}
  const u=auth.currentUser;
  if(u) db.ref(`users/${u.uid}/leitner_state`).set(newState).catch(()=>{});
  return added;
}
function countNewLeitnerCards(deck, configType) {
  let state;
  try { state = JSON.parse(localStorage.getItem("leitner_state"))||initLeitnerState(); }
  catch { state = initLeitnerState(); }
  const seen = new Set(); let count = 0;
  deck.forEach(card => {
    let id;
    if (configType==='dept') id = card.num;
    else if (configType==='chef') id = 'chef_'+card.num;
    else if (configType==='cap') id = 'cap_'+card.pays;
    else if (configType==='philo') id = 'philo_'+card.nom;
    else if (configType==='hist') id = card.id;
    else if (configType==='figures') id = 'figstyle_'+card.id;
    if (id && !seen.has(id) && !state.cards[id]) { seen.add(id); count++; }
  });
  return count;
}

// ─── FIGURES FICHE (mode leçon) ───
function FigureFicheScreen({config, onBack, onEnd}) {
  const [deck]=useState(()=>{
    const noms=new Set((config?.groupes||FIGURES_GROUPES_LIST).flatMap(g=>FIGURES_GROUPES[g]||[]));
    return shuffle(FIGURES_STYLE.filter(f=>noms.has(f.nom)));
  });
  const [idx,setIdx]=useState(0);
  const [animating,setAnimating]=useState(false);
  const card=deck[idx];
  const color=FIGURES_CAT_COLORS[card.categorie]||"#9d174d";

  const go = (delta) => {
    const next = idx+delta;
    if (next<0) return;
    if (next>=deck.length) { onEnd({deck, config:{type:'figures',...(config||{})}, mode:'lesson'}); return; }
    setAnimating(true);
    setTimeout(()=>{setIdx(next);setTimeout(()=>setAnimating(false),50);},180);
  };

  useEffect(()=>{
    const fn=e=>{if(e.key==="ArrowRight")go(1);if(e.key==="ArrowLeft")go(-1);};
    window.addEventListener("keydown",fn);return()=>window.removeEventListener("keydown",fn);
  },[idx]);

  return (
    <div className="min-h-screen flex flex-col" style={{background:"linear-gradient(160deg,#060b18 0%,#2d0a1a 100%)"}}>
      <div className="flex items-center justify-between px-5 pt-6 pb-2" style={{maxWidth:480,margin:'0 auto',width:'100%'}}>

          Retour
        </button>
        <span className="text-white/40 font-mono text-sm tabular-nums">{idx+1} / {deck.length}</span>
      </div>
      <div className="px-5 mb-3" style={{maxWidth:480,margin:'0 auto',width:'100%'}}>
        <div className="h-1 rounded-full overflow-hidden" style={{background:'rgba(255,255,255,0.08)'}}>
          <div className="h-full" style={{width:`${((idx+1)/deck.length)*100}%`,background:`linear-gradient(90deg,${color},${color}cc)`,borderRadius:999,transition:'width 0.4s'}}/>
        </div>
      </div>
      <div className="flex-1 overflow-y-auto px-4 pb-4" style={{opacity:animating?0:1,transition:"opacity 0.18s ease",maxWidth:480,margin:'0 auto',width:'100%'}}>
        <div className="flex flex-col gap-3">
          {/* Nom card */}
          <div className="rounded-2xl p-5" style={{background:`linear-gradient(135deg,${color}cc,${color})`,boxShadow:`0 8px 32px ${color}55`}}>
            <p className="text-white/60 text-xs font-semibold uppercase tracking-widest mb-1">Figure de style · {card.categorie}</p>
            <h2 className="text-white font-black text-3xl tracking-tight leading-tight">{card.nom}</h2>
          </div>
          {/* Définition */}
          <div className="glass-strong rounded-2xl p-5">
            <p className="text-xs font-semibold uppercase tracking-widest mb-2" style={{color}}>Définition</p>
            <p className="text-white/90 text-sm leading-relaxed">{card.definition}</p>
          </div>
          {/* Exemple */}
          <div className="glass rounded-2xl p-5">
            <p className="text-xs font-semibold uppercase tracking-widest mb-2" style={{color}}>Exemple</p>
            <p className="text-white/85 text-sm leading-relaxed italic">{card.exemple}</p>
          </div>
          {/* Effet */}
          <div className="glass rounded-2xl p-4">
            <p className="text-xs font-semibold uppercase tracking-widest mb-1.5" style={{color}}>Effet produit</p>
            <p className="text-white/70 text-sm leading-relaxed">{card.effet}</p>
          </div>
        </div>
      </div>
      <div className="px-4 pb-6 pt-3 safe-bottom" style={{maxWidth:480,margin:'0 auto',width:'100%'}}>
        <div className="grid grid-cols-2 gap-3">
          <button onClick={()=>go(-1)} disabled={idx===0} className="btn-press py-4 rounded-2xl text-white font-semibold text-sm"
            style={{background:'rgba(255,255,255,0.08)',opacity:idx===0?0.35:1,cursor:idx===0?'not-allowed':'pointer'}}>

          </button>
          <button onClick={()=>go(1)} className="btn-press py-4 rounded-2xl text-white font-bold text-sm"

// ─── FIGURES DÉFI (flashcard retournement) ───
function FigureDefiScreen({config, onBack, onEnd, retryDeck}) {
  const [deck]=useState(()=>{
    if(retryDeck) return shuffle([...retryDeck]);
    const noms=new Set((config?.groupes||FIGURES_GROUPES_LIST).flatMap(g=>FIGURES_GROUPES[g]||[]));
    const dir=config?.dir||"nom-to-def";
    return shuffle(FIGURES_STYLE.filter(f=>noms.has(f.nom))).map(f=>({...f,dir}));
  });
  const [idx,setIdx]=useState(0);
  const [flipped,setFlipped]=useState(false);
  const [scores,setScores]=useState([]);
  const [animating,setAnimating]=useState(false);
  const card=deck[idx];
  const color=FIGURES_CAT_COLORS[card.categorie]||"#9d174d";
  const isNomFront=card.dir==="nom-to-def";

  const next=knew=>{
    const ns=[...scores,knew];
    if(idx+1>=deck.length){onEnd({deck,scores:ns,config,mode:"challenge"});return;}
    setScores(ns);setAnimating(true);
    setTimeout(()=>{setFlipped(false);setIdx(i=>i+1);setTimeout(()=>setAnimating(false),50);},200);
  };

  useEffect(()=>{
    const fn=e=>{
      if(["ArrowUp","ArrowDown"," "].includes(e.key)){e.preventDefault();if(!flipped)setFlipped(true);}
      if(flipped&&e.key==="ArrowRight")next(true);
      if(flipped&&e.key==="ArrowLeft")next(false);
    };
    window.addEventListener("keydown",fn);return()=>window.removeEventListener("keydown",fn);
  },[flipped,idx,scores]);

// ─── PHILO FICHE (mode leçon) ───
function PhiloFicheScreen({config, onBack, onEnd}) {
  const [deck]=useState(()=>{
    const noms=new Set((config?.groupes||PERIODES_PHILO).flatMap(g=>PHILO_GROUPES[g]||[]));
    return shuffle(COURANTS.filter(c=>noms.has(c.nom)));
  });
  const [idx,setIdx]=useState(0);
  const [animating,setAnimating]=useState(false);
  const card=deck[idx];

  const go = (delta) => {
    const next = idx+delta;
    if (next<0) return;
    if (next>=deck.length) { onEnd({deck, config:{type:'philo',...(config||{})}, mode:'lesson'}); return; }
    setAnimating(true);
    setTimeout(()=>{setIdx(next);setTimeout(()=>setAnimating(false),50);},180);
  };

  useEffect(()=>{
    const fn=e=>{if(e.key==="ArrowRight")go(1);if(e.key==="ArrowLeft")go(-1);};
    window.addEventListener("keydown",fn);return()=>window.removeEventListener("keydown",fn);

  return (
    <div className="min-h-screen flex flex-col" style={{background:"linear-gradient(160deg,#060b18 0%,#12073a 100%)"}}>

// ─── LESSON (dept + cap) ───
function LessonScreen({config, onBack, onEnd, retryDeck}) {
  const [deck]=useState(()=>{
    if(retryDeck) return shuffle([...retryDeck]);
    const base = config.type==="dept"
      ? shuffle(DEPARTEMENTS.filter(d=>config.regions.includes(d.region)))
      : config.type==="hist"
        ? shuffle(DATES_HISTORIQUES.filter(d=>config.periodes.includes(d.periode)))
        : shuffle(CAPITALES_RAW.filter(c=>config.continents.includes(c.continent)));
    const dirs = config.type==="dept"
      ? resolveDeptDirs(config.subject,config.dir)
      : config.type==="hist"
        ? (config.dir==="mixed"?["date-to-evt","evt-to-date"]:[config.dir])
        : config.dir==="mixed"?["pays-to-cap","cap-to-pays"]:[config.dir];
    return base.map(d=>({...d,dir:dirs[Math.floor(Math.random()*dirs.length)]}));
  });
  const [idx,setIdx]=useState(0);
  const [flipped,setFlipped]=useState(false);
  const [scores,setScores]=useState([]);
  const [animating,setAnimating]=useState(false);
  const card=deck[idx];
  const color=config.type==="dept"?(REGION_COLORS[card.region]||"#4A90D9"):config.type==="hist"?(PERIODE_COLORS[card.periode]||"#4A90D9"):(CONTINENT_COLORS[card.continent]||"#4A90D9");
  const {front,back,frontLabel,backLabel}=config.type==="dept"?getDeptCardFrontBack(card):config.type==="hist"?getHistCardFrontBack(card):getCapCardFrontBack(card);

  const next=knew=>{
    const ns=[...scores,knew];
    if(idx+1>=deck.length){onEnd({deck,scores:ns,config,mode:"lesson"});return;}
    setScores(ns);setAnimating(true);
    setTimeout(()=>{setFlipped(false);setIdx(i=>i+1);setTimeout(()=>setAnimating(false),50);},200);
  };
  useEffect(()=>{
    const fn=e=>{
      if(["ArrowUp","ArrowDown"," "].includes(e.key)){e.preventDefault();if(!flipped)setFlipped(true);}
      if(flipped&&e.key==="ArrowRight")next(true);
      if(flipped&&e.key==="ArrowLeft")next(false);
    };
    window.addEventListener("keydown",fn);return()=>window.removeEventListener("keydown",fn);
  },[flipped,idx,scores]);

  return(
    <div className="min-h-screen flex flex-col" style={{background:`linear-gradient(160deg,#060b18 0%,${color}33 100%)`}}>
      <div className="flex flex-col flex-1" style={{maxWidth:480,margin:'0 auto',width:'100%',padding:'20px 16px 24px'}}>
        {/* Header */}
        <div className="flex items-center justify-between mb-3">
          <button onClick={onBack} className="flex items-center gap-1.5 text-white/40 hover:text-white text-sm font-medium transition-colors" style={{cursor:'pointer'}}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M15 18l-6-6 6-6"/></svg>
            Config
          </button>
          <div className="text-center">
            <p className="text-white/70 font-semibold text-xs">{config.type==="dept"?card.region:config.type==="hist"?card.periode:card.continent}</p>
            <p className="text-white/30 text-xs">{frontLabel} → {backLabel}</p>
          </div>
          <span className="text-white/40 font-mono text-sm tabular-nums">{idx+1}/{deck.length}</span>
        </div>
        {/* Progress */}
        <div className="h-1 rounded-full overflow-hidden mb-6" style={{background:'rgba(255,255,255,0.10)'}}>
          <div className="h-full rounded-full" style={{width:`${(idx/deck.length)*100}%`,background:'linear-gradient(90deg,rgba(255,255,255,0.5),rgba(255,255,255,0.9))',transition:'width 0.4s ease'}}/>
        </div>
        {/* Card flip */}
        <div className="flex-1 flex items-center">
          <div style={{perspective:"1200px",width:'100%'}} onClick={()=>!flipped&&setFlipped(true)}>
            <div className="relative w-full select-none flip-card-inner" style={{height:220,opacity:animating?0:1,transform:flipped?"rotateY(180deg)":"rotateY(0deg)"}}>
              {/* Front */}

                style={{background:'#ffffff',boxShadow:'0 20px 60px rgba(0,0,0,0.5)',backfaceVisibility:'hidden'}}>
                <p className="text-xs font-semibold uppercase tracking-widest mb-3" style={{color}}>{frontLabel}</p>
                <p className="font-black text-center text-gray-900" style={{fontSize:front.length>20?"1.4rem":front.length>12?"2rem":"2.8rem",lineHeight:1.1}}>{front}</p>
                {!flipped&&<p className="text-gray-400 text-xs mt-5 font-medium">Toucher pour révéler</p>}

              {/* Back */}
              <div className="absolute inset-0 rounded-3xl flip-card-face flip-card-back flex flex-col items-center justify-center p-7"
                style={{background:color,boxShadow:`0 20px 60px ${color}55`,backfaceVisibility:'hidden'}}>
                <p className="text-xs font-semibold uppercase tracking-widest mb-3 text-white/65">{backLabel}</p>

              </div>

          : <div className="h-14 flex items-center justify-center">
              <p className="text-white/25 text-xs font-medium">← À revoir · Je savais → (après révélation)</p>

        : shuffle(CAPITALES_RAW.filter(c=>config.continents.includes(c.continent)));
    const dirs = config.type==="dept"
      ? resolveDeptDirs(config.subject,config.dir)
      : config.type==="hist"
        ? (config.dir==="mixed"?["date-to-evt","evt-to-date"]:[config.dir])
        : config.dir==="mixed"?["pays-to-cap","cap-to-pays"]:[config.dir];
    return base.map(d=>({...d,dir:dirs[Math.floor(Math.random()*dirs.length)]}));
  });
  const [idx,setIdx]=useState(0);
  const [input,setInput]=useState("");
  const [feedback,setFeedback]=useState(null);
  const [scores,setScores]=useState([]);
  const [elapsed,setElapsed]=useState(0);
  const [animating,setAnimating]=useState(false);
  const inputRef=useRef(null);
  const timerRef=useRef(null);
  const card=deck[idx];
  const color=config.type==="dept"?(REGION_COLORS[card.region]||"#E74C3C"):config.type==="hist"?(PERIODE_COLORS[card.periode]||"#E74C3C"):(CONTINENT_COLORS[card.continent]||"#E74C3C");
  const {front,back,frontLabel,backLabel}=config.type==="dept"?getDeptCardFrontBack(card):config.type==="hist"?getHistCardFrontBack(card):getCapCardFrontBack(card);

  useEffect(()=>{timerRef.current=setInterval(()=>setElapsed(e=>e+1),1000);return()=>clearInterval(timerRef.current);},[]);
  useEffect(()=>{if(inputRef.current&&!feedback)inputRef.current.focus();},[idx,feedback]);
  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;

  const submit=()=>{
    if(feedback||!input.trim())return;
    const ok=isCorrect(input,back);
    setFeedback(ok?"correct":"wrong");
    setTimeout(()=>{
      const ns=[...scores,ok];
      if(idx+1>=deck.length){clearInterval(timerRef.current);onEnd({deck,scores:ns,config,mode:"challenge",elapsed});return;}
      setScores(ns);setAnimating(true);
      setTimeout(()=>{setInput("");setFeedback(null);setIdx(i=>i+1);setTimeout(()=>setAnimating(false),50);},200);
    },900);
  };

  return(
    <div className="min-h-screen flex flex-col" style={{background:"linear-gradient(160deg,#060b18 0%,#1a0a2b 100%)"}}>
      <div className="flex flex-col flex-1 px-4 pt-5 pb-6" style={{maxWidth:480,margin:'0 auto',width:'100%'}}>
        {/* Header */}
        <div className="flex items-center justify-between mb-3">
          <button onClick={onBack} className="flex items-center gap-1.5 text-white/40 hover:text-white text-sm font-medium transition-colors" style={{cursor:'pointer'}}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M15 18l-6-6 6-6"/></svg>
            Config
          </button>
          {/* Timer */}
          <div className="flex items-center gap-2 rounded-xl px-3 py-1.5" style={{background:'rgba(239,68,68,0.15)',border:'1px solid rgba(239,68,68,0.25)'}}>
            <Clock size={14} color="#f87171"/>
            <span className="text-white font-mono font-bold text-sm tabular-nums">{fmt(elapsed)}</span>
          </div>
          <span className="text-white/40 font-mono text-sm tabular-nums">{idx+1}/{deck.length}</span>
        </div>
        {/* Progress */}
        <div className="h-1 rounded-full overflow-hidden mb-4" style={{background:'rgba(255,255,255,0.08)'}}>
          <div className="h-full rounded-full" style={{width:`${(idx/deck.length)*100}%`,background:'linear-gradient(90deg,#ef4444,#f97316)',transition:'width 0.4s ease'}}/>
        </div>
        {/* Score row */}
        <div className="flex justify-center gap-5 mb-4">
          <span className="flex items-center gap-1.5 text-xs font-semibold tabular-nums" style={{color:'#4ade80'}}><CheckCircle size={13}/>{scores.filter(Boolean).length} correct</span>
          <span className="flex items-center gap-1.5 text-xs font-semibold tabular-nums" style={{color:'#f87171'}}><XCircle size={13}/>{scores.filter(x=>!x).length} raté</span>
        </div>
        {/* Question card */}
        <div className="w-full rounded-3xl flex flex-col items-center justify-center p-7 mb-4"
          style={{
            background:feedback==="correct"?'linear-gradient(135deg,#064e3b,#059669)':feedback==="wrong"?'linear-gradient(135deg,#7f1d1d,#dc2626)':'#ffffff',
            minHeight:160,
            opacity:animating?0:1,
            transition:'background 0.2s, opacity 0.15s',
            boxShadow:feedback?"0 16px 48px rgba(0,0,0,0.4)":'0 16px 48px rgba(0,0,0,0.3)'
          }}>
          <p className="text-xs font-semibold uppercase tracking-widest mb-2" style={{color:feedback?"rgba(255,255,255,0.55)":"#dc2626"}}>{frontLabel}</p>
          <p className="font-black text-center" style={{color:feedback?"white":"#0f172a",fontSize:front.length>20?"1.4rem":front.length>12?"2rem":"2.8rem",lineHeight:1.1}}>{front}</p>
          {feedback==="wrong" && <p className="text-white/80 text-sm mt-3 text-center font-medium">{backLabel} : <strong>{back}</strong></p>}
          {feedback==="correct" && <p className="text-emerald-200 text-sm mt-2 font-semibold">Correct !</p>}
        </div>
        <p className="text-white/35 text-xs text-center mb-2 font-medium">Répondre : {backLabel}</p>
        {/* Input row */}
        <div className="flex gap-2">
          <input ref={inputRef} value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&submit()} disabled={!!feedback}
            placeholder={`${backLabel}…`}
            className="flex-1 rounded-2xl px-4 text-sm font-semibold outline-none"
            style={{
              background:'rgba(255,255,255,0.08)',
              color:'white',
              border:feedback==="correct"?'1.5px solid #4ade80':feedback==="wrong"?'1.5px solid #f87171':'1.5px solid rgba(255,255,255,0.18)',
              height:52,
              transition:'border-color 0.15s'
            }}/>
          <button onClick={submit} disabled={!!feedback||!input.trim()} className="btn-press px-5 rounded-2xl text-white font-bold text-sm"
            style={{height:52,background:input.trim()&&!feedback?'linear-gradient(135deg,#c2410c,#dc2626)':'rgba(255,255,255,0.08)',cursor:input.trim()&&!feedback?'pointer':'not-allowed',opacity:input.trim()&&!feedback?1:0.5}}>
            OK
          </button>
        </div>
        <p className="text-white/25 text-xs text-center mt-2.5 font-medium">Entrée pour valider · Accents facultatifs</p>
      </div>
    </div>
  );
}

// ─── RESULT ───
function ResultScreen({data, onRetry, onHome, isGuest}) {
  const {deck,scores,config,mode,elapsed}=data;
  const leitnerConfigType = config.type==='dept' && config.subject==='chef' ? 'chef' : config.type;
  const [leitnerAdded, setLeitnerAdded] = useState(null);
  const newLeitnerCount = useState(()=> mode==='lesson' ? countNewLeitnerCards(deck, leitnerConfigType) : 0)[0];
  const known=scores.filter(Boolean).length;
  const pct=Math.round((known/deck.length)*100);
  const toReview=deck.filter((_,i)=>!scores[i]);
  const fmt=s=>s?`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`:null;
  const emoji=pct>=90?"🏆":pct>=70?"🎉":pct>=50?"👍":"📚";
  return(
    <div className="min-h-screen flex flex-col" style={{background:"linear-gradient(160deg,#060b18 0%,#0d1630 100%)"}}>
      <div className="flex flex-col flex-1 px-4 pt-8 pb-8 anim-fadeUp" style={{maxWidth:440,margin:'0 auto',width:'100%'}}>
        {/* Score hero */}
        <div className="text-center mb-8">
          <div className="inline-flex items-center justify-center w-24 h-24 rounded-3xl mb-4"
            style={{background:pct>=70?'linear-gradient(135deg,#064e3b,#059669)':'linear-gradient(135deg,#7f1d1d,#dc2626)',boxShadow:pct>=70?'0 16px 48px rgba(5,150,105,0.4)':'0 16px 48px rgba(220,38,38,0.4)'}}>
            <span style={{fontSize:44}}>{emoji}</span>
          </div>
          <h2 className="text-white text-6xl font-black tracking-tight">{pct}<span className="text-3xl">%</span></h2>
          <p className="text-white/50 text-base mt-1 font-medium">{known} / {deck.length} correctes</p>
          <div className="flex flex-wrap items-center justify-center gap-2 mt-3">
            <span className="glass text-white/55 text-xs px-3 py-1 rounded-full font-medium">{config.type==="dept"?"Départements":config.type==="philo"?"Philosophie":config.type==="hist"?"Dates historiques":config.type==="figures"?"Figures de style":"Capitales"}</span>
            <span className="glass text-white/55 text-xs px-3 py-1 rounded-full font-medium">{mode==="lesson"?"Leçon":"Défi"}</span>
            {elapsed&&<span className="glass text-white/55 text-xs px-3 py-1 rounded-full font-medium flex items-center gap-1"><Clock size={10}/>{fmt(elapsed)}</span>}
          </div>
        </div>

        {/* To review */}
        {toReview.length>0&&(
          <div className="glass rounded-2xl p-4 mb-4">
            <p className="text-white/60 font-semibold mb-3 text-xs uppercase tracking-widest">À revoir ({toReview.length})</p>
            <div className="flex flex-wrap gap-2 max-h-36 overflow-y-auto">
              {toReview.map((d,i)=>(
                <span key={i} className="text-white/80 text-xs px-3 py-1.5 rounded-full font-medium" style={{background:'rgba(239,68,68,0.2)',border:'1px solid rgba(239,68,68,0.25)'}}>
                  {config.type==="dept"&&config.subject==="chef"?`${d.num} – ${d.nom} → ${d.chef}`:config.type==="dept"?`${d.num} – ${d.nom}`:config.type==="philo"?d.nom:config.type==="hist"?`${d.date} – ${d.evenement.substring(0,35)}…`:config.type==="figures"?d.nom:`${d.pays} → ${d.capitale}`}
                </span>
              ))}
            </div>
          </div>
        )}

        {/* Actions */}
        <div className="flex flex-col gap-3">
          {mode==='lesson' && (
            isGuest
              ? <div className="py-3 rounded-2xl text-center text-white/40 text-xs glass font-medium flex items-center justify-center gap-2">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                  Connecte-toi pour sauvegarder dans la Boîte de Leitner
                </div>
              : leitnerAdded !== null
                ? <div className="py-3 rounded-2xl text-center text-white/55 text-sm glass font-medium">
                    ✓ {leitnerAdded} carte{leitnerAdded>1?"s":""} ajoutée{leitnerAdded>1?"s":""} à la Boîte de Leitner
                  </div>
                : newLeitnerCount > 0
                  ? <button onClick={()=>setLeitnerAdded(addCardsToLeitnerStorage(deck,leitnerConfigType))}
                      className="btn-press py-4 rounded-2xl text-white font-bold text-sm" style={{background:'linear-gradient(135deg,#1e3a5f,#2563eb)',boxShadow:'0 8px 24px rgba(37,99,235,0.3)',cursor:'pointer'}}>
                      Envoyer dans la Boîte de Leitner ({newLeitnerCount} nouvelle{newLeitnerCount>1?"s":""})
                    </button>
                  : <div className="py-3 rounded-2xl text-center text-white/30 text-xs glass font-medium">Toutes les cartes sont déjà dans la Boîte de Leitner</div>
          )}
          {toReview.length>0&&(
            <button onClick={()=>onRetry(toReview)} className="btn-press py-4 rounded-2xl text-white font-bold text-sm flex items-center justify-center gap-2" style={{background:'linear-gradient(135deg,#7f1d1d,#dc2626)',boxShadow:'0 8px 24px rgba(220,38,38,0.25)',cursor:'pointer'}}>
              <RotateCcw size={15}/> Retravailler les erreurs ({toReview.length})
            </button>
          )}
          <button onClick={()=>onRetry(null)} className="btn-press py-4 rounded-2xl text-white font-bold text-sm flex items-center justify-center gap-2"
            style={{background:mode==="lesson"?'linear-gradient(135deg,#064e3b,#059669)':'linear-gradient(135deg,#7f1d1d,#b91c1c)',cursor:'pointer'}}>
            <RotateCcw size={15}/> Recommencer
          </button>
          <button onClick={onHome} className="btn-press py-4 rounded-2xl text-white/60 hover:text-white font-semibold text-sm glass" style={{cursor:'pointer'}}>
            ← Accueil
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── LEITNER COMPONENT ───

function LeitnerScreen({onBack,isGuest}) {
  const [state,setState]=useState(()=>{if(isGuest)return initGuestLeitnerState();try{const s=localStorage.getItem("leitner_state");return s?JSON.parse(s):initLeitnerState();}catch{return initLeitnerState();}});
  const [view,setView]=useState("home");
  const [sessionDeck,setSessionDeck]=useState([]);
  const [idx,setIdx]=useState(0);
  const [flipped,setFlipped]=useState(false);
  const [animating,setAnimating]=useState(false);

  const save=s=>{
    setState(s);
    if(!isGuest){
      try{localStorage.setItem("leitner_state",JSON.stringify(s));}catch{}
      const u=auth.currentUser;
      if(u) db.ref(`users/${u.uid}/leitner_state`).set(s).catch(()=>{});
    }
  };
  const startSession=()=>{
    const due=shuffle(getLeitnerDueCards(state)).map(c=>{
      const t=c.type||'dept';
      let _side;
      if(t==='cap') _side=Math.random()<0.5?"pays-to-cap":"cap-to-pays";
      else if(t==='philo') _side=Math.random()<0.5?"nom-to-back":"back-to-nom";
      else if(t==='hist') _side=Math.random()<0.5?"date-to-evt":"evt-to-date";
      else if(t==='figures') _side="nom-to-def";
      else if(t==='chef') _side="dept-to-chef";
      else _side=Math.random()<0.5?"num-to-nom":"nom-to-num";
      return{...c,_side};
    });
    if(due.length===0){setView("nodues");return;}
    setSessionDeck(due);setIdx(0);setFlipped(false);setView("session");
  };

  useEffect(()=>{
    const today=new Date().toISOString().slice(0,10);
    const allCards=[...LEITNER_CARDS,...(state.customCards||[])];
    let changed=false;
    const newCards={...state.cards};
    allCards.forEach(c=>{
      const s=newCards[c.id];
      if(s&&s.box===0&&s.lastReviewedDate&&s.lastReviewedDate<today){
        newCards[c.id]={box:1,lastReviewedDate:null};
        changed=true;
      }
    });
    if(changed){const ns={...state,cards:newCards};save(ns);}
  },[]);

  const handleAnswer=knew=>{
    const card=sessionDeck[idx];
    const today=new Date().toISOString().slice(0,10);
    const newState={...state,cards:{...state.cards}};
    const cur=newState.cards[card.id]||{box:1,lastReviewedDate:null};
    newState.cards[card.id]={box:knew?Math.min(cur.box+1,5):Math.max(cur.box-1,1),lastReviewedDate:today};
    if(idx+1>=sessionDeck.length){newState.session=state.session+1;save(newState);scheduleNotification();setView("done");return;}
    save(newState);setAnimating(true);
    setTimeout(()=>{setFlipped(false);setIdx(i=>i+1);setTimeout(()=>setAnimating(false),50);},200);
  };

  useEffect(()=>{
    const fn=e=>{
      if(view!=="session")return;
      if(["ArrowUp","ArrowDown"," "].includes(e.key)){e.preventDefault();if(!flipped)setFlipped(true);}
      if(flipped&&e.key==="ArrowRight")handleAnswer(true);
      if(flipped&&e.key==="ArrowLeft")handleAnswer(false);
    };
    window.addEventListener("keydown",fn);return()=>window.removeEventListener("keydown",fn);
  },[view,flipped,idx]);

  const allLeitnerCards=[...LEITNER_CARDS,...(state.customCards||[])];
  const boxCounts=LEITNER_BOXES.map(b=>({...b,count:allLeitnerCards.filter(c=>{const s=state.cards[c.id];return(s!==undefined?s.box:1)===b.n;}).length}));
  const dueCount=getLeitnerDueCards(state).length;
  const totalCards=allLeitnerCards.length;
  const today=new Date().toISOString().slice(0,10);
  const todayFR=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  // ── Tags dynamiques (régions/continents des cartes actives dans les boîtes) ──
  const activeContentTags=(()=>{
    const activeIds=new Set(Object.entries(state.cards).filter(([,s])=>s.box>0).map(([id])=>id));
    const tags=[];
    const seenLabels=new Set();

    // Départements : tag groupé seulement si toutes les LEITNER_REGIONS sont présentes
    const activeDeptRegions=new Set(allLeitnerCards.filter(c=>(c.type||'dept')==='dept'&&activeIds.has(c.id)).map(c=>c.region));
    if(activeDeptRegions.size>0){
      if(LEITNER_REGIONS.every(r=>activeDeptRegions.has(r))){
        tags.push({label:'Départements',color:'#1a3a6b'});
      }else{
        activeDeptRegions.forEach(r=>{if(!seenLabels.has(r)){seenLabels.add(r);tags.push({label:r,color:REGION_COLORS[r]||'#1a3a6b'});}});
      }
    }

    // Chefs-lieux : même logique
    const activeChefRegions=new Set(allLeitnerCards.filter(c=>c.type==='chef'&&activeIds.has(c.id)).map(c=>c.region));
    if(activeChefRegions.size>0){
      if(LEITNER_REGIONS.every(r=>activeChefRegions.has(r))){
        tags.push({label:'Chefs-lieux',color:'#0f4c35'});
      }else{
        activeChefRegions.forEach(r=>{const lbl=r+' – chefs-lieux';if(!seenLabels.has(lbl)){seenLabels.add(lbl);tags.push({label:lbl,color:REGION_COLORS[r]||'#0f4c35'});}});
      }
    }

    // Capitales, Philosophie, Dates : toujours un seul tag
    if(allLeitnerCards.some(c=>c.type==='cap'&&activeIds.has(c.id)))     tags.push({label:'Capitales',        color:'#1a3b1a'});
    if(allLeitnerCards.some(c=>c.type==='philo'&&activeIds.has(c.id)))  tags.push({label:'Philosophie',      color:'#5b21b6'});
    if(allLeitnerCards.some(c=>c.type==='hist'&&activeIds.has(c.id)))   tags.push({label:'Dates historiques', color:'#7d3a00'});
    if(allLeitnerCards.some(c=>c.type==='figures'&&activeIds.has(c.id)))tags.push({label:'Figures de style', color:'#831843'});

    return tags.sort((a,b)=>a.label.localeCompare(b.label));
  })();

  // ── Prochaine révision par boîte (boîtes 1-5 seulement, si des cartes dedans) ──
  const boxNextReviews=LEITNER_BOXES.filter(b=>b.n>=1).map(b=>{
    const cardsInBox=allLeitnerCards.filter(c=>(state.cards[c.id]?.box??1)===b.n);
    if(cardsInBox.length===0)return null;
    let soonestDays=null;
    cardsInBox.forEach(c=>{
      const s=state.cards[c.id];
      if(!s||!s.lastReviewedDate){soonestDays=0;return;}
      const diffDays=Math.floor((new Date(today)-new Date(s.lastReviewedDate))/86400000);
      if(diffDays>=b.intervalDays){soonestDays=0;}
      else{const left=b.intervalDays-diffDays;if(soonestDays===null||left<soonestDays)soonestDays=left;}
    });
    const date=soonestDays===0?null:(()=>{const d=new Date();d.setDate(d.getDate()+soonestDays);return d.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});})();
    return{box:b,count:cardsInBox.length,daysLeft:soonestDays,date};
  }).filter(Boolean);

  if(view==="home") return(
    <div className="min-h-screen flex flex-col" style={{background:"linear-gradient(160deg,#060b18 0%,#0d1630 100%)"}}>
      <div className="flex-1 overflow-y-auto px-4 pt-6 pb-6" style={{maxWidth:440,margin:'0 auto',width:'100%'}}>
        <button onClick={onBack} className="flex items-center gap-1.5 text-white/40 hover:text-white text-sm font-medium mb-5 transition-colors" style={{cursor:'pointer'}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M15 18l-6-6 6-6"/></svg>
          Accueil
        </button>

        {/* Header */}
        <div className="mb-5 anim-fadeUp">
          <div className="flex items-center gap-3 mb-1">
            <div className="flex items-center justify-center w-10 h-10 rounded-xl" style={{background:'linear-gradient(135deg,#1e3a5f,#2563eb)'}}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg>
            </div>
            <div>
              <h1 className="text-white font-black text-xl">Boîte de Leitner</h1>
              <p className="text-white/35 text-xs font-medium">Session #{state.session} · {totalCards} cartes · <span style={{textTransform:'capitalize'}}>{todayFR}</span></p>
            </div>
          </div>
        </div>

        {/* Box legend */}
        <div className="glass rounded-2xl p-4 mb-3">
          <p className="text-white/45 text-xs font-semibold uppercase tracking-widest mb-3">Les 6 boîtes</p>
          <div className="grid grid-cols-3 gap-2">
            {LEITNER_BOXES.map(b=>(
              <div key={b.n} className="flex items-center gap-2 rounded-xl p-2" style={{background:'rgba(255,255,255,0.05)'}}>
                <div className="flex-shrink-0 w-7 h-7 rounded-full flex items-center justify-center text-white font-black text-xs" style={{background:b.color}}>{b.n}</div>
                <p className="text-white/50 text-xs leading-tight">{b.desc}</p>
              </div>
            ))}
          </div>
        </div>

        {/* Bar chart */}
        <div className="glass rounded-2xl p-4 mb-3">
          <p className="text-white/45 text-xs font-semibold uppercase tracking-widest mb-4">Répartition</p>
          <div className="flex items-end justify-between gap-1.5 h-20 mb-2">
            {boxCounts.map(b=>{const h=Math.max(totalCards>0?(b.count/totalCards)*72:0,b.count>0?5:2);return(
              <div key={b.n} className="flex-1 flex flex-col items-center gap-1">
                <span className="text-white font-bold text-xs tabular-nums" style={{opacity:b.count===0?0.3:1}}>{b.count}</span>
                <div className="w-full rounded-t-md" style={{height:h,background:b.color,opacity:b.count===0?0.2:1,transition:'height 0.4s ease'}}/>
              </div>
            );})}
          </div>
          <div className="flex justify-between">
            {LEITNER_BOXES.map(b=><div key={b.n} className="flex-1 text-center"><p className="text-white/30 text-xs">B{b.n}</p></div>)}
          </div>
        </div>

        {/* Contenu dynamique */}
        {activeContentTags.length>0&&(
          <div className="glass rounded-2xl p-4 mb-3">

// ─── ACADÉMIE DES ÉCHECS ───
const CHESS_PIECES = {
  wK:"♔",wQ:"♕",wR:"♖",wB:"♗",wN:"♘",wP:"♙",
  bK:"♚",bQ:"♛",bR:"♜",bB:"♝",bN:"♞",bP:"♟",
};
const CHESS_FILES = {a:0,b:1,c:2,d:3,e:4,f:5,g:6,h:7};
const CHESS_LIGHT = "#eeeed2";
const CHESS_DARK  = "#769656";
const CHESS_LIGHT_HL = "#f7f769";
const CHESS_DARK_HL  = "#bbcb44";

function chessInitBoard() {
  const b = Array(8).fill(null).map(() => Array(8).fill(null));
  const order = ["R","N","B","Q","K","B","N","R"];
  order.forEach((p,i) => { b[0][i] = "b"+p; b[7][i] = "w"+p; });
  for(let i=0;i<8;i++) { b[1][i]="bP"; b[6][i]="wP"; }
  return b;
}
function chessApplyMove(board, move, color) {
  const b = board.map(r=>[...r]);
  const mv = move.replace(/[+#!?]/g,'');
  if(mv==="O-O") {
    const row=color==="w"?7:0;
    b[row][6]=color+"K";b[row][4]=null;b[row][5]=color+"R";b[row][7]=null; return b;
  }
  if(mv==="O-O-O") {
    const row=color==="w"?7:0;
    b[row][2]=color+"K";b[row][4]=null;b[row][3]=color+"R";b[row][0]=null; return b;
  }
  if(mv.length===2&&mv[0]>='a'&&mv[0]<='h') {
    const tc=CHESS_FILES[mv[0]],tr=8-parseInt(mv[1]),dir=color==="w"?1:-1;
    for(let dr=1;dr<=2;dr++){const fr=tr+dir*dr;if(fr>=0&&fr<8&&b[fr][tc]===color+"P"){b[tr][tc]=color+"P";b[fr][tc]=null;break;}}
    return b;
  }
  if(mv.includes("x")&&mv[0]>='a'&&mv[0]<='h') {
    const fc=CHESS_FILES[mv[0]],tc=CHESS_FILES[mv[2]],tr=8-parseInt(mv[3]),dir=color==="w"?1:-1,fr=tr+dir;
    if(b[fr][fc]===color+"P"){b[tr][tc]=color+"P";b[fr][fc]=null;}
    return b;
  }
  if(mv[0]>='A'&&mv[0]<='Z') {
    const type=mv[0],dest=mv.replace(/x/g,''),tc=CHESS_FILES[dest[dest.length-2]],tr=8-parseInt(dest[dest.length-1]);
    for(let r=0;r<8;r++) for(let c=0;c<8;c++) {
      if(b[r][c]===color+type) {
        const dr=Math.abs(tr-r),dc=Math.abs(tc-c);
        let ok=false;
        if(type==="N") ok=(dr===2&&dc===1)||(dr===1&&dc===2);
        if(type==="B") ok=dr===dc;
        if(type==="R") ok=dr===0||dc===0;
        if(type==="Q") ok=dr===0||dc===0||dr===dc;
        if(type==="K") ok=dr<=1&&dc<=1;
        if(ok&&(!b[tr][tc]||b[tr][tc][0]!==color)){b[tr][tc]=color+type;b[r][c]=null;return b;}
      }
    }
    for(let r=0;r<8;r++) for(let c=0;c<8;c++) {
      if(b[r][c]===color+type){b[tr][tc]=color+type;b[r][c]=null;return b;}
    }
  }
  return b;
}
function chessBuildBoard(moves, upToIdx) {
  let b = chessInitBoard();
  for(let i=0;i<=upToIdx;i++) b = chessApplyMove(b, moves[i].move, moves[i].color);
  return b;
}

const CHESS_DIFF_COLOR = d => d==="Débutant"?"#10b981":d==="Intermédiaire"?"#f59e0b":"#ef4444";
const CHESS_FILTERS = ["Tous","Débutant","Intermédiaire","Avancé"];

function ChessBoard({boardState, highlight}) {
  return (
    <div style={{display:"inline-block",border:"6px solid #3d3d2c",borderRadius:4,boxShadow:"0 8px 32px rgba(0,0,0,.6)"}}>
      {Array(8).fill(0).map((_,r)=>(
        <div key={r} style={{display:"flex"}}>
          <div style={{width:18,display:"flex",alignItems:"center",justifyContent:"center",background:"#3d3d2c",color:"#eeeed2",fontSize:10,fontWeight:700}}>{8-r}</div>
          {Array(8).fill(0).map((_,c)=>{
            const isLight=(r+c)%2===0;
            const isHl=highlight&&highlight[0]===r&&highlight[1]===c;
            const bg=isLight?(isHl?CHESS_LIGHT_HL:CHESS_LIGHT):(isHl?CHESS_DARK_HL:CHESS_DARK);
            const piece=boardState[r][c];
            return (
              <div key={c} style={{width:44,height:44,background:bg,display:"flex",alignItems:"center",justifyContent:"center"}}>
                {piece&&<span style={{fontSize:34,lineHeight:1,userSelect:"none",color:piece[0]==="w"?"#ffffff":"#1a1a1a",textShadow:piece[0]==="w"?"0 0 1px #000,0 0 2px #000,1px 1px 2px rgba(0,0,0,.5)":"0 0 1px #fff,1px 1px 2px rgba(0,0,0,.4)",fontFamily:"'Arial Unicode MS','Segoe UI Symbol',sans-serif"}}>{CHESS_PIECES[piece]}</span>}
              </div>
            );
          })}
        </div>
      ))}
      <div style={{display:"flex",background:"#3d3d2c"}}>
        <div style={{width:18}}/>
        {"abcdefgh".split("").map(f=>(
          <div key={f} style={{width:44,textAlign:"center",color:"#eeeed2",fontSize:10,fontWeight:700,padding:"2px 0"}}>{f}</div>
        ))}
      </div>
    </div>
  );
}

function ChessLessonView({opening, onBack}) {
  const [step, setStep] = React.useState(-1);
  const [boardState, setBoardState] = React.useState(chessInitBoard());
  const [highlight, setHighlight] = React.useState(null);

  React.useEffect(()=>{
    if(step===-1){setBoardState(chessInitBoard());setHighlight(null);return;}
    const b=chessBuildBoard(opening.moves,step);
    setBoardState(b);
    const mv=opening.moves[step].move.replace(/[+#!?]/g,'');
    if(mv.length===2&&mv[0]>='a') setHighlight([8-parseInt(mv[1]),CHESS_FILES[mv[0]]]);
    else if(mv.length===3&&mv[0]>='A') setHighlight([8-parseInt(mv[2]),CHESS_FILES[mv[1]]]);
    else if(mv.includes("x")) setHighlight([8-parseInt(mv[mv.length-1]),CHESS_FILES[mv[mv.length-2]]]);
    else setHighlight(null);
  },[step,opening]);

  return (
    <div style={{minHeight:"100vh",background:"#1a1a2e",fontFamily:"'Georgia',serif",color:"#f1f5f9"}}>
      <div style={{maxWidth:900,margin:"0 auto",padding:"16px"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:18}}>
          <button onClick={onBack} style={{background:"#2d2d44",border:"none",color:"#94a3b8",cursor:"pointer",borderRadius:10,padding:"8px 14px",fontSize:13,fontWeight:700,fontFamily:"Georgia,serif"}}>← Retour</button>
          <div>
            <h2 style={{margin:0,fontSize:"1.2rem",fontWeight:800,fontFamily:"Georgia,serif"}}>{opening.emoji} {opening.name}</h2>
            <p style={{margin:0,fontSize:11,color:"#64748b"}}>{opening.eco} · {opening.category} · <span style={{color:CHESS_DIFF_COLOR(opening.difficulty)}}>{opening.difficulty}</span></p>
          </div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"auto 1fr",gap:18,alignItems:"start"}}>
          <div>
            <ChessBoard boardState={boardState} highlight={highlight}/>
            <div style={{marginTop:10,maxWidth:380}}>
              <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                <button onClick={()=>setStep(-1)} style={{padding:"4px 8px",borderRadius:6,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"Georgia,serif",background:step===-1?"#d4af37":"#2d2d44",color:step===-1?"#1a1a2e":"#94a3b8"}}>Départ</button>
                {opening.moves.map((m,i)=>(
                  <button key={i} onClick={()=>setStep(i)} style={{padding:"4px 8px",borderRadius:6,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"Georgia,serif",background:step===i?(m.color==="w"?"#d4af37":"#8B6914"):"#2d2d44",color:step===i?"#1a1a2e":"#94a3b8"}}>{m.notation}</button>

              </div>
            </div>
            <div style={{display:"flex",gap:8,marginTop:8,maxWidth:380}}>

            </div>
          </div>

          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {step===-1?(
              <>
                <div style={{background:"#2d2d44",borderRadius:12,padding:16}}>
                  <h3 style={{margin:"0 0 8px",fontSize:"0.95rem",fontWeight:700,color:"#d4af37",fontFamily:"Georgia,serif"}}>📖 Description</h3>
                  <p style={{margin:0,color:"#94a3b8",fontSize:13,lineHeight:1.7}}>{opening.description}</p>
                </div>
                <div style={{background:"#2d2d44",borderRadius:12,padding:16}}>
                  <h3 style={{margin:"0 0 8px",fontSize:"0.95rem",fontWeight:700,fontFamily:"Georgia,serif"}}>🎯 Principes clés</h3>
                  {opening.principles.map((p,i)=>(
                    <div key={i} style={{display:"flex",gap:8,alignItems:"flex-start",marginBottom:6}}>
                      <div style={{width:22,height:22,borderRadius:"50%",background:opening.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,flexShrink:0,color:"white"}}>{i+1}</div>
                      <p style={{margin:0,color:"#94a3b8",fontSize:12,lineHeight:1.5}}>{p}</p>
                    </div>
                  ))}
                </div>
                <div style={{background:"#2d2d44",borderRadius:12,padding:16}}>
                  <h3 style={{margin:"0 0 8px",fontSize:"0.95rem",fontWeight:700,fontFamily:"Georgia,serif"}}>🏆 Parties célèbres</h3>
                  {opening.famousGames.map((g,i)=><div key={i} style={{color:"#64748b",fontSize:12,marginBottom:3}}>♟ {g}</div>)}
                </div>
                <button onClick={()=>setStep(0)} style={{padding:"11px",borderRadius:12,border:"none",cursor:"pointer",background:"linear-gradient(135deg,#d4af37,#f5c842)",color:"#1a1a2e",fontWeight:700,fontSize:14,fontFamily:"Georgia,serif"}}>▶ Commencer la leçon</button>
              </>
            ):(
              <>
                <div style={{background:"#2d2d44",borderRadius:12,padding:18,borderLeft:`4px solid ${opening.moves[step].color==="w"?"#f5f0e8":"#2c1810"}`}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                    <div style={{width:38,height:38,borderRadius:"50%",background:opening.moves[step].color==="w"?"#f5f0e8":"#2c1810",border:"2px solid #8B6914",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{opening.moves[step].color==="w"?"♔":"♚"}</div>
                    <div>
                      <div style={{fontSize:18,fontWeight:800,color:"#d4af37",fontFamily:"Georgia,serif"}}>{opening.moves[step].notation}</div>
                      <div style={{fontSize:11,color:"#64748b"}}>{opening.moves[step].color==="w"?"Blancs jouent":"Noirs jouent"}</div>
                    </div>
                  </div>
                  <p style={{margin:0,color:"#cbd5e1",fontSize:13,lineHeight:1.8}}>{opening.moves[step].explain}</p>
                </div>
                <div style={{background:"#2d2d44",borderRadius:12,padding:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:12,color:"#64748b"}}>
                    <span>Progression</span><span>{step+1} / {opening.moves.length}</span>
                  </div>
                  <div style={{background:"#3d3d5c",borderRadius:10,height:7}}>
                    <div style={{background:"linear-gradient(90deg,#d4af37,#f5c842)",height:7,borderRadius:10,width:`${((step+1)/opening.moves.length)*100}%`,transition:"width .3s"}}/>
                  </div>
                </div>
                {step===opening.moves.length-1&&(
                  <div style={{background:"#2d2d44",borderRadius:12,padding:14,border:"1px solid #d4af37"}}>
                    <div style={{fontSize:16,marginBottom:4}}>💡 Conseil de maître</div>
                    <p style={{margin:0,color:"#94a3b8",fontSize:12,lineHeight:1.7}}>{opening.tip}</p>
                  </div>
                )}
                {step===opening.moves.length-1&&(
                  <button onClick={onBack} style={{padding:"11px",borderRadius:12,border:"none",cursor:"pointer",background:"linear-gradient(135deg,#d4af37,#f5c842)",color:"#1a1a2e",fontWeight:700,fontSize:14,fontFamily:"Georgia,serif"}}>✓ Leçon terminée — Choisir une autre</button>
                )}
              </>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

function chessSetupBoard(boardArr) {
  return boardArr.map(row => row.map(cell => cell||null));
}

function ChessEndingLessonView({ending, onBack}) {
  const [step, setStep] = React.useState(-1);
  const currentBoard = step===-1 ? chessSetupBoard(ending.board) : ending.moves[step].board ? chessSetupBoard(ending.moves[step].board) : chessSetupBoard(ending.board);

  return (
    <div style={{minHeight:"100vh",background:"#1a1a2e",fontFamily:"'Georgia',serif",color:"#f1f5f9"}}>
      <div style={{maxWidth:900,margin:"0 auto",padding:"16px"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:18}}>
          <button onClick={onBack} style={{background:"#2d2d44",border:"none",color:"#94a3b8",cursor:"pointer",borderRadius:10,padding:"8px 14px",fontSize:13,fontWeight:700,fontFamily:"Georgia,serif"}}>← Retour</button>
          <div>
            <h2 style={{margin:0,fontSize:"1.2rem",fontWeight:800,fontFamily:"Georgia,serif"}}>{ending.emoji} {ending.name}</h2>
            <p style={{margin:0,fontSize:11,color:"#64748b"}}><span style={{color:CHESS_DIFF_COLOR(ending.difficulty)}}>{ending.difficulty}</span></p>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"auto 1fr",gap:18,alignItems:"start"}}>
          <div>
            <ChessBoard boardState={currentBoard} highlight={null}/>
            <div style={{display:"flex",gap:8,marginTop:10,maxWidth:380}}>
              <button onClick={()=>setStep(s=>Math.max(-1,s-1))} disabled={step===-1} style={{flex:1,padding:"8px",borderRadius:8,border:"none",cursor:step===-1?"not-allowed":"pointer",background:"#2d2d44",color:step===-1?"#3d3d5c":"#94a3b8",fontWeight:700,fontSize:18}}>◀</button>
              <button onClick={()=>setStep(s=>Math.min(ending.moves.length-1,s+1))} disabled={step===ending.moves.length-1} style={{flex:1,padding:"8px",borderRadius:8,border:"none",cursor:step===ending.moves.length-1?"not-allowed":"pointer",background:"#d4af37",color:"#1a1a2e",fontWeight:700,fontSize:18}}>▶</button>
            </div>
            <div style={{marginTop:6,maxWidth:380}}>
              <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                <button onClick={()=>setStep(-1)} style={{padding:"4px 8px",borderRadius:6,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:step===-1?"#d4af37":"#2d2d44",color:step===-1?"#1a1a2e":"#94a3b8"}}>Départ</button>
                {ending.moves.map((m,i)=>(
                  <button key={i} onClick={()=>setStep(i)} style={{padding:"4px 8px",borderRadius:6,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:step===i?(m.color==="w"?"#d4af37":"#8B6914"):"#2d2d44",color:step===i?"#1a1a2e":"#94a3b8"}}>{m.notation}</button>
                ))}
              </div>
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {step===-1?(
              <>
                <div style={{background:"#2d2d44",borderRadius:12,padding:16}}>
                  <h3 style={{margin:"0 0 8px",fontSize:"0.95rem",fontWeight:700,color:"#d4af37",fontFamily:"Georgia,serif"}}>📖 Description</h3>
                  <p style={{margin:0,color:"#94a3b8",fontSize:13,lineHeight:1.7}}>{ending.description}</p>
                </div>
                <div style={{background:"#2d2d44",borderRadius:12,padding:16}}>
                  <h3 style={{margin:"0 0 8px",fontSize:"0.95rem",fontWeight:700,fontFamily:"Georgia,serif"}}>🎯 Principes clés</h3>
                  {ending.principles.map((p,i)=>(
                    <div key={i} style={{display:"flex",gap:8,alignItems:"flex-start",marginBottom:6}}>
                      <div style={{width:22,height:22,borderRadius:"50%",background:ending.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,flexShrink:0,color:"white"}}>{i+1}</div>
                      <p style={{margin:0,color:"#94a3b8",fontSize:12,lineHeight:1.5}}>{p}</p>
                    </div>
                  ))}
                </div>
                <button onClick={()=>setStep(0)} style={{padding:"11px",borderRadius:12,border:"none",cursor:"pointer",background:"linear-gradient(135deg,#d4af37,#f5c842)",color:"#1a1a2e",fontWeight:700,fontSize:14,fontFamily:"Georgia,serif"}}>▶ Voir la technique</button>
              </>
            ):(
              <>
                <div style={{background:"#2d2d44",borderRadius:12,padding:18,borderLeft:`4px solid ${ending.moves[step].color==="w"?"#f5f0e8":"#2c1810"}`}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                    <div style={{width:38,height:38,borderRadius:"50%",background:ending.moves[step].color==="w"?"#f5f0e8":"#2c1810",border:"2px solid #8B6914",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{ending.moves[step].color==="w"?"♔":"♚"}</div>
                    <div>
                      <div style={{fontSize:18,fontWeight:800,color:"#d4af37",fontFamily:"Georgia,serif"}}>{ending.moves[step].notation}</div>
                      <div style={{fontSize:11,color:"#64748b"}}>{ending.moves[step].color==="w"?"Blancs jouent":"Noirs jouent"}</div>
                    </div>
                  </div>
                  <p style={{margin:0,color:"#cbd5e1",fontSize:13,lineHeight:1.8}}>{ending.moves[step].explain}</p>
                </div>
                <div style={{background:"#2d2d44",borderRadius:12,padding:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:12,color:"#64748b"}}>
                    <span>Progression</span><span>{step+1} / {ending.moves.length}</span>
                  </div>
                  <div style={{background:"#3d3d5c",borderRadius:10,height:7}}>
                    <div style={{background:"linear-gradient(90deg,#d4af37,#f5c842)",height:7,borderRadius:10,width:`${((step+1)/ending.moves.length)*100}%`,transition:"width .3s"}}/>
                  </div>
                </div>
                {step===ending.moves.length-1&&(
                  <div style={{background:"#2d2d44",borderRadius:12,padding:14,border:"1px solid #d4af37"}}>
                    <div style={{fontSize:16,marginBottom:4}}>💡 À retenir</div>
                    <p style={{margin:0,color:"#94a3b8",fontSize:12,lineHeight:1.7}}>{ending.tip}</p>
                  </div>
                )}
                {step===ending.moves.length-1&&(
                  <button onClick={onBack} style={{padding:"11px",borderRadius:12,border:"none",cursor:"pointer",background:"linear-gradient(135deg,#d4af37,#f5c842)",color:"#1a1a2e",fontWeight:700,fontSize:14,fontFamily:"Georgia,serif"}}>✓ Terminé — Choisir une autre</button>
                )}
              </>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

  const [user,setUser]=useState(null);
  const [authLoading,setAuthLoading]=useState(true);
  const [isGuest,setIsGuest]=useState(false);

  useEffect(()=>{
    const unsub=auth.onAuthStateChanged(async u=>{
      if(u){
        try{
          const snap=await db.ref(`users/${u.uid}/leitner_state`).once('value');
          const fbData=snap.val();
          if(fbData) localStorage.setItem('leitner_state',JSON.stringify(fbData));
        }catch(e){}
      }
      setUser(u);
      setAuthLoading(false);
    });
    return ()=>unsub();
  },[]);

  useEffect(()=>{ if(user) requestAndScheduleNotifications(); },[user]);

  if(authLoading) return <LoadingScreen/>;
  if(!user && !isGuest) return <LoginScreen onGuestLogin={()=>setIsGuest(true)}/>;

  const goHome=()=>{setScreen("home");setCategory(null);setGameMode(null);setPlayConfig(null);setResultData(null);setRetryDeck(null);};

  if(screen==="home") return <HomeScreen user={user} isGuest={isGuest} onSignIn={()=>setIsGuest(false)} onSelectMode={c=>{
    if(c==="leitner"){setScreen("leitner");return;}
    if(c==="echecs"){setScreen("echecs");return;}
    setCategory(c);setScreen("gamemode");
  }}/>;

  if(screen==="echecs") return <ChessAcademy onBack={goHome}/>;

  if(screen==="leitner") return <LeitnerScreen isGuest={isGuest} onBack={goHome}/>;

  if(screen==="gamemode") return <GameModeScreen category={category} onSelect={m=>{setGameMode(m);setScreen("setup");}} onBack={goHome}/>;

  if(screen==="setup"){
    const goBack=()=>setScreen("gamemode");
    const startPlay=cfg=>{setPlayConfig(cfg);setRetryDeck(null);setScreen("play");};
    if(category==="departements") return <SetupDept gameMode={gameMode} onStart={startPlay} onBack={goBack}/>;
    if(category==="capitales")    return <SetupCapitales gameMode={gameMode} onStart={startPlay} onBack={goBack}/>;
    if(category==="dates")        return <SetupDates gameMode={gameMode} onStart={startPlay} onBack={goBack}/>;
    if(category==="philo")        return <SetupPhilo gameMode={gameMode} onStart={startPlay} onBack={goBack}/>;
    if(category==="figures")      return <SetupFigures gameMode={gameMode} onStart={startPlay} onBack={goBack}/>;
  }

  if(screen==="result") return <ResultScreen data={resultData} isGuest={isGuest} onRetry={d=>{setRetryDeck(d);setScreen("play");}} onHome={goHome}/>;

  if(screen==="play"){
    const k=retryDeck?"retry":"fresh";
    const cfg=playConfig;
    // Figures leçon → fiches
    if(cfg?.type==="figures"&&gameMode==="lesson")
      return <FigureFicheScreen key={k} config={cfg} onBack={()=>setScreen("setup")} onEnd={d=>{setResultData(d);setScreen("result");}}/>;
    // Figures défi → flashcards
    if(cfg?.type==="figures"&&gameMode==="challenge")
      return <FigureDefiScreen key={k} config={cfg} retryDeck={retryDeck} onBack={()=>setScreen("setup")} onEnd={d=>{setResultData(d);setScreen("result");}}/>;
    // Philo leçon → fiches
    if(cfg?.type==="philo"&&gameMode==="lesson")
      return <PhiloFicheScreen key={k} config={cfg} onBack={()=>setScreen("setup")} onEnd={d=>{setResultData(d);setScreen("result");}}/>;
    // Philo défi → flashcards 2 blocs
    if(cfg?.type==="philo"&&gameMode==="challenge")
      return <PhiloDefiScreen key={k} config={cfg} retryDeck={retryDeck} onBack={()=>setScreen("setup")} onEnd={d=>{setResultData(d);setScreen("result");}}/>;
    // Dept / Cap leçon
    if(gameMode==="lesson")
      return <LessonScreen key={k} config={cfg} retryDeck={retryDeck} onBack={()=>setScreen("setup")} onEnd={d=>{setResultData(d);setScreen("result");}}/>;
    // Dept / Cap défi
    return <ChallengeScreen key={k} config={cfg} retryDeck={retryDeck} onBack={()=>setScreen("setup")} onEnd={d=>{setResultData(d);setScreen("result");}}/>;
  }

  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
