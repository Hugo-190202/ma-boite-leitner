// ─── SERVICE WORKER & NOTIFICATIONS ───
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
function scheduleNotification() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  navigator.serviceWorker.ready.then(reg => {
    const next9am = new Date();
    next9am.setDate(next9am.getDate() + 1);
    next9am.setHours(9, 0, 0, 0);
    reg.active?.postMessage({
      type: 'SCHEDULE',
      delay: next9am - new Date(),
      title: '📦 GéoFlash – Révision du jour',
      body: 'C\'est l\'heure de réviser ta boîte de Leitner !'
    });
  });
}
async function requestAndScheduleNotifications() {
  if (!('Notification' in window) || !('serviceWorker' in navigator)) return;
  if (Notification.permission === 'default') {
    await Notification.requestPermission();
  }
  scheduleNotification();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function normalize(s) { return s.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[-']/g," ").replace(/\s+/g," "); }
function isCorrect(i,a) { return normalize(i)===normalize(a); }

  const d = card.dir;
  if (d==="num-to-nom")  return {front:card.num,  back:card.nom,  frontLabel:"Numéro",      backLabel:"Département"};
  if (d==="nom-to-num")  return {front:card.nom,  back:card.num,  frontLabel:"Département", backLabel:"Numéro"};
  if (d==="nom-to-chef") return {front:card.nom,  back:card.chef, frontLabel:"Département", backLabel:"Chef-lieu"};
  if (d==="chef-to-nom") return {front:card.chef, back:card.nom,  frontLabel:"Chef-lieu",   backLabel:"Département"};
  if (d==="num-to-chef") return {front:card.num,  back:card.chef, frontLabel:"Numéro",      backLabel:"Chef-lieu"};
  return {front:card.num, back:card.nom, frontLabel:"Numéro", backLabel:"Département"};
}
function getCapCardFrontBack(card) {

function resolveDeptDirs(subject, dir) {
  if (subject==="num-nom") { if (dir==="mixed") return ["num-to-nom","nom-to-num"]; return [dir]; }
  if (subject==="chef")    { if (dir==="mixed") return ["nom-to-chef","chef-to-nom","num-to-chef"]; return [dir]; }
  return ["num-to-nom"];
}

const LEITNER_REGIONS = ["Bretagne","Corse","Grand Est","Hauts-de-France","Île-de-France","Normandie","Provence-Alpes-Côte d'Azur"];
const LEITNER_CARDS = DEPARTEMENTS.filter(d => LEITNER_REGIONS.includes(d.region)).map(d => ({id:d.num, num:d.num, nom:d.nom, region:d.region}));
const LEITNER_BOXES = [
  {n:1,color:"#c0392b",desc:"Tous les jours",intervalDays:1},
  {n:2,color:"#e67e22",desc:"Tous les 3 jours",intervalDays:3},
  {n:3,color:"#f1c40f",desc:"Toutes les semaines",intervalDays:7},
  {n:4,color:"#27ae60",desc:"Toutes les 2 semaines",intervalDays:14},
  {n:5,color:"#2980b9",desc:"Tous les mois",intervalDays:30},
];
function initLeitnerState() {
  const cards = {};
  LEITNER_CARDS.forEach(c => { cards[c.id] = {box:1, lastReviewedDate:null}; });
  return {cards, session:1, customCards:[]};
}
function getLeitnerDueCards(state) {
  const today = new Date().toISOString().slice(0,10);
  const allCards = [...LEITNER_CARDS, ...(state.customCards||[])];
  return allCards.filter(c => {
    const s = state.cards[c.id];
    if (!s || !s.lastReviewedDate) return true;
    const box = LEITNER_BOXES.find(b => b.n===s.box);
    const diffDays = Math.floor((new Date(today)-new Date(s.lastReviewedDate))/86400000);
    return diffDays >= box.intervalDays;
  });
}
function addCardsToLeitnerStorage(deck, configType) {
  let state;
  try { state = JSON.parse(localStorage.getItem("leitner_state"))||initLeitnerState(); }
  catch { state = initLeitnerState(); }
  const newState = {...state, cards:{...state.cards}, customCards:[...(state.customCards||[])]};
  const defaultIds = new Set(LEITNER_CARDS.map(c=>c.id));
  const existingCustomIds = new Set(newState.customCards.map(c=>c.id));
  const seen = new Set();
  let added = 0;
  deck.forEach(card => {
    let id, customCard;
    if (configType==='dept') {
      id = card.num;
      if (!defaultIds.has(id) && !existingCustomIds.has(id))
        customCard = {id, type:'dept', num:card.num, nom:card.nom, region:card.region};
    } else if (configType==='cap') {
      id = 'cap_'+card.pays;
      if (!existingCustomIds.has(id))
        customCard = {id, type:'cap', pays:card.pays, capitale:card.capitale, continent:card.continent};
    } else if (configType==='philo') {
      id = 'philo_'+card.nom;
      if (!existingCustomIds.has(id))
        customCard = {id, type:'philo', nom:card.nom, definition:card.definition, auteurs:card.auteurs};
    }
    if (id && !seen.has(id) && !newState.cards[id]) {
      seen.add(id); newState.cards[id] = {box:1, lastReviewedDate:null};
      if (customCard) newState.customCards.push(customCard);
      added++;
    }
  });
  try { localStorage.setItem("leitner_state", JSON.stringify(newState)); } catch {}
  const u=auth.currentUser;
  if(u) db.ref(`users/${u.uid}/leitner_state`).set(newState).catch(()=>{});
  return added;
}
function countNewLeitnerCards(deck, configType) {
  let state;
  try { state = JSON.parse(localStorage.getItem("leitner_state"))||initLeitnerState(); }
  catch { state = initLeitnerState(); }
  const seen = new Set(); let count = 0;
  deck.forEach(card => {
    let id;
    if (configType==='dept') id = card.num;
    else if (configType==='cap') id = 'cap_'+card.pays;
    else if (configType==='philo') id = 'philo_'+card.nom;
    if (id && !seen.has(id) && !state.cards[id]) { seen.add(id); count++; }
  });
  return count;
}

// ─── PHILO FICHE (mode leçon) ───
function PhiloFicheScreen({onBack, onEnd}) {
  const [deck]=useState(()=>shuffle(COURANTS));
  const [idx,setIdx]=useState(0);
  const [animating,setAnimating]=useState(false);
  const card=deck[idx];

  const go = (delta) => {
    const next = idx+delta;
    if (next<0) return;
    if (next>=deck.length) { onEnd({deck, config:{type:'philo'}, mode:'lesson'}); return; }
    setAnimating(true);
    setTimeout(()=>{setIdx(next);setTimeout(()=>setAnimating(false),50);},180);
  };

  useEffect(()=>{
    const fn=e=>{if(e.key==="ArrowRight")go(1);if(e.key==="ArrowLeft")go(-1);};
    window.addEventListener("keydown",fn);return()=>window.removeEventListener("keydown",fn);
  },[idx]);

  return (
    <div className="min-h-screen flex flex-col" style={{background:"linear-gradient(160deg,#1a0d2e 0%,#2d1a4a 100%)"}}>
      <div className="flex items-center justify-between px-5 pt-6 pb-3">
        <button onClick={onBack} className="text-white/50 hover:text-white text-sm">← Retour</button>
        <span className="text-white/70 font-mono text-sm">{idx+1} / {deck.length}</span>
      </div>
      <div className="px-5 mb-4">
        <div className="h-1.5 bg-white/15 rounded-full overflow-hidden">
          <div className="h-full bg-purple-400 rounded-full transition-all duration-500" style={{width:`${((idx+1)/deck.length)*100}%`}}/>
        </div>
      </div>
      <div className="flex-1 overflow-y-auto px-4 pb-4" style={{opacity:animating?0:1,transition:"opacity 0.15s"}}>
        <div className="max-w-md mx-auto flex flex-col gap-3">
          <div className="rounded-2xl p-5" style={{background:"#5b21b6"}}>
            <p className="text-purple-300 text-xs uppercase tracking-widest mb-1">Courant philosophique</p>
            <h2 className="text-white font-black text-3xl">{card.nom}</h2>
            <p className="text-purple-300 text-sm mt-1">🕰️ {card.periode}</p>
            <div className="flex flex-wrap gap-1.5 mt-3">
              {card.tags.map(t=><span key={t} className="text-xs px-2.5 py-1 rounded-full bg-white/20 text-white/80">{t}</span>)}
            </div>
          </div>
          <div className="rounded-2xl p-5 bg-white">
            <p className="text-xs uppercase tracking-widest font-bold mb-2 text-purple-600">📖 Définition</p>
            <p className="text-gray-800 text-sm leading-relaxed">{card.definition}</p>
          </div>
          <div className="rounded-2xl p-5" style={{background:"rgba(255,255,255,0.1)"}}>
            <p className="text-xs uppercase tracking-widest font-bold mb-3 text-purple-300">✍️ Auteurs clés</p>
            <div className="flex flex-wrap gap-2">
              {card.auteurs.split(", ").map(a=><span key={a} className="bg-white/15 text-white text-sm px-3 py-1.5 rounded-full font-medium">{a}</span>)}
            </div>
          </div>
        </div>
      </div>
      <div className="px-4 pb-6 pt-2">
        <div className="max-w-md mx-auto grid grid-cols-2 gap-3">
          <button onClick={()=>go(-1)} disabled={idx===0}
            className="py-4 rounded-2xl text-white font-bold transition-all"
            style={{background:idx===0?"rgba(255,255,255,0.06)":"rgba(255,255,255,0.18)",opacity:idx===0?0.4:1}}>
            ← Précédent
          </button>
          <button onClick={()=>go(1)}
            className="py-4 rounded-2xl text-white font-bold hover:scale-105 transition-all"
            style={{background:"#5b21b6"}}>
            {idx+1>=deck.length?"Terminé ✓":"Suivant →"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── PHILO DÉFI (flashcard 2 blocs) ───
function PhiloDefiScreen({config, onBack, onEnd}) {
  const [deck]=useState(()=>shuffle(COURANTS).map(c=>({...c,dir:config.dir==="mixed"?["nom-to-back","back-to-nom"][Math.floor(Math.random()*2)]:config.dir})));
  const [idx,setIdx]=useState(0);
  const [flipped,setFlipped]=useState(false);
  const [scores,setScores]=useState([]);
  const [animating,setAnimating]=useState(false);
  const card=deck[idx];
  const isNomFront=card.dir==="nom-to-back";

  const next=knew=>{
    const ns=[...scores,knew];
    if(idx+1>=deck.length){onEnd({deck,scores:ns,config,mode:"challenge"});return;}
    setScores(ns);setAnimating(true);

function ChallengeScreen({config, onBack, onEnd}) {
  const [deck]=useState(()=>{
    const base = config.type==="dept"
      ? shuffle(DEPARTEMENTS.filter(d=>config.regions.includes(d.region)))
      : shuffle(CAPITALES_RAW.filter(c=>config.continents.includes(c.continent)));
    const dirs = config.type==="dept"
      ? resolveDeptDirs(config.subject,config.dir)
      : config.dir==="mixed"?["pays-to-cap","cap-to-pays"]:[config.dir];
    return base.map(d=>({...d,dir:dirs[Math.floor(Math.random()*dirs.length)]}));
  });
  const [idx,setIdx]=useState(0);
  const [input,setInput]=useState("");
  const [feedback,setFeedback]=useState(null);
  const [scores,setScores]=useState([]);
  const [elapsed,setElapsed]=useState(0);
  const [animating,setAnimating]=useState(false);
  const inputRef=useRef(null);
  const timerRef=useRef(null);
  const card=deck[idx];
  const color=config.type==="dept"?(REGION_COLORS[card.region]||"#E74C3C"):(CONTINENT_COLORS[card.continent]||"#E74C3C");
  const {front,back,frontLabel,backLabel}=config.type==="dept"?getDeptCardFrontBack(card):getCapCardFrontBack(card);

  useEffect(()=>{timerRef.current=setInterval(()=>setElapsed(e=>e+1),1000);return()=>clearInterval(timerRef.current);},[]);
  useEffect(()=>{if(inputRef.current&&!feedback)inputRef.current.focus();},[idx,feedback]);
  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;

  const submit=()=>{
    if(feedback||!input.trim())return;
    const ok=isCorrect(input,back);
    setFeedback(ok?"correct":"wrong");
    setTimeout(()=>{
      const ns=[...scores,ok];
      if(idx+1>=deck.length){clearInterval(timerRef.current);onEnd({deck,scores:ns,config,mode:"challenge",elapsed});return;}
      setScores(ns);setAnimating(true);
      setTimeout(()=>{setInput("");setFeedback(null);setIdx(i=>i+1);setTimeout(()=>setAnimating(false),50);},200);
    },900);
  };

  return(
    <div className="min-h-screen flex flex-col items-center justify-center p-6" style={{background:"linear-gradient(135deg,#3d0f0f 0%,#1a0a2b 100%)"}}>
      <div className="w-full max-w-md">

          <div className="flex items-center gap-2 bg-white/10 px-4 py-2 rounded-full">
            <Clock size={16} className="text-red-400"/>
            <span className="text-white font-mono font-bold text-lg">{fmt(elapsed)}</span>
          </div>
          <span className="text-white/70 font-mono text-sm">{idx+1}/{deck.length}</span>
        </div>
        <div className="h-2 bg-white/20 rounded-full mb-4 overflow-hidden">
          <div className="h-full bg-red-500 rounded-full transition-all duration-500" style={{width:`${(idx/deck.length)*100}%`}}/>
        </div>
        <div className="flex justify-center gap-6 mb-4">
          <div className="flex items-center gap-1.5 text-green-400 font-bold text-sm"><CheckCircle size={15}/> {scores.filter(Boolean).length}</div>
          <div className="flex items-center gap-1.5 text-red-400 font-bold text-sm"><XCircle size={15}/> {scores.filter(x=>!x).length}</div>
        </div>
        <div className="w-full rounded-3xl shadow-2xl flex flex-col items-center justify-center p-8 mb-4 transition-all"
          style={{background:feedback==="correct"?"#1a6b3c":feedback==="wrong"?"#6b1a1a":"white",minHeight:160,opacity:animating?0:1}}>
          <p className="text-xs uppercase tracking-widest font-semibold mb-2" style={{color:feedback?"rgba(255,255,255,0.6)":"#E74C3C"}}>{frontLabel}</p>
          <p className="font-black text-center" style={{color:feedback?"white":"#1a2a4a",fontSize:front.length>18?"1.6rem":front.length>10?"2.2rem":"3rem",lineHeight:1.15}}>{front}</p>
          {feedback==="wrong"&&<p className="text-white/80 text-sm mt-3">✅ {backLabel} : <strong>{back}</strong></p>}
          {feedback==="correct"&&<p className="text-green-200 text-sm mt-3 font-semibold">✓ Correct !</p>}
        </div>
        <p className="text-white/50 text-xs text-center mb-2">→ {backLabel}</p>
        <div className="flex gap-2">
          <input ref={inputRef} value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&submit()} disabled={!!feedback}
            placeholder={`Tapez ${backLabel.toLowerCase()}…`}
            className="flex-1 rounded-2xl px-4 py-4 text-base font-semibold outline-none transition-all"
            style={{background:"rgba(255,255,255,0.1)",color:"white",border:feedback==="correct"?"2px solid #27AE60":feedback==="wrong"?"2px solid #E74C3C":"2px solid rgba(255,255,255,0.2)"}}/>
          <button onClick={submit} disabled={!!feedback||!input.trim()}
            className="px-5 py-4 rounded-2xl text-white font-black transition-all hover:scale-105"
            style={{background:input.trim()&&!feedback?"#E74C3C":"rgba(255,255,255,0.1)"}}>OK</button>
        </div>
        <p className="text-white/30 text-xs text-center mt-3">Entrée pour valider · Accents facultatifs</p>
      </div>
    </div>
  );
}

function LeitnerScreen({onBack}) {
  const [state,setState]=useState(()=>{try{const s=localStorage.getItem("leitner_state");return s?JSON.parse(s):initLeitnerState();}catch{return initLeitnerState();}});
  const [view,setView]=useState("home");
  const [sessionDeck,setSessionDeck]=useState([]);
  const [idx,setIdx]=useState(0);
  const [flipped,setFlipped]=useState(false);
  const [animating,setAnimating]=useState(false);

  const save=s=>{
    setState(s);
    try{localStorage.setItem("leitner_state",JSON.stringify(s));}catch{}
    const u=auth.currentUser;
    if(u) db.ref(`users/${u.uid}/leitner_state`).set(s).catch(()=>{});
  };
  const startSession=()=>{
    const due=shuffle(getLeitnerDueCards(state)).map(c=>{
      const t=c.type||'dept';
      let _side;
      if(t==='cap') _side=Math.random()<0.5?"pays-to-cap":"cap-to-pays";
      else if(t==='philo') _side=Math.random()<0.5?"nom-to-back":"back-to-nom";
      else _side=Math.random()<0.5?"num-to-nom":"nom-to-num";
      return{...c,_side};
    });
    if(due.length===0){setView("nodues");return;}
    setSessionDeck(due);setIdx(0);setFlipped(false);setView("session");
  };

  const handleAnswer=knew=>{
    const card=sessionDeck[idx];
    const today=new Date().toISOString().slice(0,10);
    const newState={...state,cards:{...state.cards}};
    const cur=newState.cards[card.id]||{box:1,lastReviewedDate:null};
    newState.cards[card.id]={box:knew?Math.min(cur.box+1,5):Math.max(cur.box-1,1),lastReviewedDate:today};
    if(idx+1>=sessionDeck.length){newState.session=state.session+1;save(newState);scheduleNotification();setView("done");return;}
    save(newState);setAnimating(true);
    setTimeout(()=>{setFlipped(false);setIdx(i=>i+1);setTimeout(()=>setAnimating(false),50);},200);
  };

  useEffect(()=>{
    const fn=e=>{
      if(view!=="session")return;
      if(["ArrowUp","ArrowDown"," "].includes(e.key)){e.preventDefault();if(!flipped)setFlipped(true);}
      if(flipped&&e.key==="ArrowRight")handleAnswer(true);
      if(flipped&&e.key==="ArrowLeft")handleAnswer(false);
    };
    window.addEventListener("keydown",fn);return()=>window.removeEventListener("keydown",fn);
  },[view,flipped,idx]);

  const allLeitnerCards=[...LEITNER_CARDS,...(state.customCards||[])];
  const boxCounts=LEITNER_BOXES.map(b=>({...b,count:allLeitnerCards.filter(c=>(state.cards[c.id]?.box||1)===b.n).length}));
  const dueCount=getLeitnerDueCards(state).length;
  const totalCards=allLeitnerCards.length;
  const today=new Date().toISOString().slice(0,10);
  const todayFR=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const nextReviewIn=(()=>{
    let soonest=null;
    allLeitnerCards.forEach(c=>{
      const s=state.cards[c.id];
      if(!s||!s.lastReviewedDate)return;
      const box=LEITNER_BOXES.find(b=>b.n===s.box);
      const diffDays=Math.floor((new Date(today)-new Date(s.lastReviewedDate))/86400000);
      if(diffDays<box.intervalDays){
        const left=box.intervalDays-diffDays;
        if(soonest===null||left<soonest)soonest=left;
      }
    });
    return soonest;
  })();
  const nextReviewDate=nextReviewIn!=null?(()=>{const d=new Date();d.setDate(d.getDate()+nextReviewIn);return d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});})():null;

  if(view==="home") return(
    <div className="min-h-screen flex flex-col items-center p-5 pt-8" style={{background:"linear-gradient(160deg,#0d1f35 0%,#1a2a4a 100%)"}}>
      <div className="w-full max-w-md">
        <button onClick={onBack} className="text-white/50 hover:text-white text-sm mb-5">← Accueil</button>
        <div className="flex items-center gap-3 mb-1"><span style={{fontSize:32}}>📦</span><h1 className="text-white text-2xl font-black">Boîte de Leitner</h1></div>
        <p className="text-blue-300 text-sm">Session #{state.session} · {totalCards} cartes</p>
        <div className="flex items-center gap-2 mt-1 mb-4">
          <span style={{fontSize:13}}>📅</span>
          <p className="text-white/50 text-xs" style={{textTransform:'capitalize'}}>{todayFR}</p>
        </div>
        <div className="bg-white/10 rounded-2xl p-3 mb-4">
          <div className="grid grid-cols-5 gap-1">
            {LEITNER_BOXES.map(b=>(
              <div key={b.n} className="text-center">
                <div className="w-6 h-6 rounded-full mx-auto mb-1 flex items-center justify-center text-white font-black" style={{background:b.color,fontSize:10}}>{b.n}</div>
                <p className="text-white/50 text-xs leading-tight">{b.desc}</p>
              </div>
            ))}
          </div>
        </div>
        <div className="bg-white/10 rounded-2xl p-4 mb-4">
          <p className="text-white/70 text-xs uppercase tracking-widest mb-4">Répartition</p>
          <div className="flex items-end justify-between gap-2 h-24 mb-2">
            {boxCounts.map(b=>{const h=Math.max(totalCards>0?(b.count/totalCards)*80:0,b.count>0?6:2);return(
              <div key={b.n} className="flex-1 flex flex-col items-center gap-1">
                <span className="text-white font-black text-sm">{b.count}</span>
                <div className="w-full rounded-t-lg" style={{height:h,background:b.color,opacity:b.count===0?0.2:1}}/>
              </div>
            );})}
          </div>
          <div className="flex justify-between">{LEITNER_BOXES.map(b=><div key={b.n} className="flex-1 text-center"><p className="text-white/40 text-xs">B{b.n}</p></div>)}</div>
        </div>
        <div className="bg-white/10 rounded-2xl p-4 mb-4">
          <p className="text-white/70 text-xs uppercase tracking-widest mb-2">Régions</p>
          <div className="flex flex-wrap gap-1.5">{LEITNER_REGIONS.map(r=><span key={r} className="text-white text-xs px-2 py-1 rounded-full" style={{background:REGION_COLORS[r]||"#555"}}>{r}</span>)}</div>
        </div>
        {dueCount===0&&nextReviewDate&&(
          <div className="rounded-2xl p-3 mb-3 flex items-center gap-3" style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.08)"}}>
            <span style={{fontSize:20}}>⏰</span>
            <div>
              <p className="text-white/80 text-sm font-bold">Prochaine révision</p>
              <p className="text-blue-300 text-xs" style={{textTransform:'capitalize'}}>{nextReviewDate} · dans {nextReviewIn} jour{nextReviewIn>1?"s":""}</p>
            </div>
          </div>
        )}
        <button onClick={startSession} className="w-full py-4 rounded-2xl text-white font-black text-lg mb-3 transition-all hover:scale-105" style={{background:dueCount>0?"#2471a3":"rgba(255,255,255,0.1)"}}>
          {dueCount>0?`▶ Démarrer (${dueCount} cartes dues)`:"✓ Rien à réviser aujourd'hui"}
        </button>
        <button onClick={()=>{if(window.confirm("Remettre toutes les cartes à zéro ?"))save(initLeitnerState());}} className="w-full py-3 rounded-2xl text-white/40 hover:text-white/70 text-sm" style={{background:"rgba(255,255,255,0.04)"}}>
          🔄 Réinitialiser
        </button>
      </div>
    </div>
  );

  if(view==="nodues") return(
    <div className="min-h-screen flex flex-col items-center justify-center p-6" style={{background:"linear-gradient(160deg,#0d1f35 0%,#1a2a4a 100%)"}}>
      <div className="text-center">
        <div className="text-6xl mb-4">✅</div>
        <h2 className="text-white text-2xl font-black mb-2">Tout est à jour !</h2>
        <p className="text-blue-300 mb-8">Aucune carte due pour cette session.</p>
        <button onClick={()=>setView("home")} className="py-4 px-8 rounded-2xl text-white font-black bg-white/10 hover:bg-white/20 transition-all">← Retour</button>
      </div>
    </div>
  );

  if(view==="session"){
    const card=sessionDeck[idx];
    const curBox=state.cards[card.id]?.box||1;
    const t=card.type||'dept';
    let front,back,frontLabel,backLabel,color;
    if(t==='cap'){
      if(card._side==='pays-to-cap'){front=card.pays;back=card.capitale;frontLabel="Pays";backLabel="Capitale";}
      else{front=card.capitale;back=card.pays;frontLabel="Capitale";backLabel="Pays";}
      color=CONTINENT_COLORS[card.continent]||"#2471a3";
    }else if(t==='philo'){
      if(card._side==='nom-to-back'){front=card.nom;back=card.definition;frontLabel="Courant";backLabel="Définition";}
      else{front=card.definition;back=card.nom;frontLabel="Définition";backLabel="Courant";}
      color="#5b21b6";
    }else{
      front=card._side==="num-to-nom"?card.num:card.nom;
      back=card._side==="num-to-nom"?card.nom:card.num;
      frontLabel=card._side==="num-to-nom"?"Numéro":"Département";
      backLabel=card._side==="num-to-nom"?"Département":"Numéro";
      color=REGION_COLORS[card.region]||"#2471a3";
    }
    return(
      <div className="min-h-screen flex flex-col items-center justify-center p-6" style={{background:`linear-gradient(135deg,${color}99 0%,#0d1f35 100%)`}}>
        <div className="w-full max-w-md">
          <div className="flex items-center justify-between mb-4">
            <button onClick={()=>setView("home")} className="text-white/50 hover:text-white text-sm">← Pause</button>
            <div className="text-center">
              <p className="text-white font-bold text-sm">{card.region}</p>
              <div className="flex items-center justify-center gap-1 mt-0.5">
                {LEITNER_BOXES.map(b=><div key={b.n} className="w-4 h-4 rounded-full flex items-center justify-center font-black" style={{background:curBox===b.n?b.color:"rgba(255,255,255,0.15)",color:"white",fontSize:8}}>{b.n}</div>)}
              </div>
            </div>
            <span className="text-white/70 font-mono text-sm">{idx+1}/{sessionDeck.length}</span>
          </div>
          <div className="h-2 bg-white/20 rounded-full mb-6 overflow-hidden">
            <div className="h-full bg-white rounded-full transition-all duration-500" style={{width:`${(idx/sessionDeck.length)*100}%`}}/>
          </div>
          <div style={{perspective:"1000px"}} onClick={()=>!flipped&&setFlipped(true)}>
            <div className="relative w-full cursor-pointer select-none transition-all duration-500"
              style={{transformStyle:"preserve-3d",transform:flipped?"rotateY(180deg)":"rotateY(0)",height:240,opacity:animating?0:1}}>
              <div className="absolute inset-0 rounded-3xl shadow-2xl flex flex-col items-center justify-center p-8 bg-white" style={{backfaceVisibility:"hidden"}}>
                <p className="text-xs uppercase tracking-widest font-semibold mb-3" style={{color}}>{frontLabel}</p>
                <p className="font-black text-center text-gray-800" style={{fontSize:front.length>25?"1.2rem":front.length>15?"1.8rem":"3.2rem",lineHeight:1.1}}>{front}</p>
                {!flipped&&<p className="text-gray-400 text-sm mt-6">Cliquer ou ↑↓ pour révéler</p>}
              </div>
              <div className="absolute inset-0 rounded-3xl shadow-2xl flex flex-col items-center justify-center p-8" style={{backfaceVisibility:"hidden",transform:"rotateY(180deg)",background:color}}>
                <p className="text-xs uppercase tracking-widest font-semibold mb-3 text-white/70">{backLabel}</p>
                <p className="font-black text-white text-center" style={{fontSize:back.length>25?"1.2rem":back.length>15?"1.8rem":"3rem",lineHeight:1.1}}>{back}</p>
                <p className="text-white/50 text-xs mt-2">{card.region}</p>
              </div>
            </div>
          </div>
          {flipped?(
            <div className="grid grid-cols-2 gap-4 mt-6">
              <button onClick={()=>handleAnswer(false)} className="py-4 rounded-2xl text-white font-bold flex items-center justify-center gap-2 hover:scale-105 transition-all" style={{background:"#E74C3C"}}><XCircle size={20}/> Boîte {Math.max(curBox-1,1)}</button>
              <button onClick={()=>handleAnswer(true)} className="py-4 rounded-2xl text-white font-bold flex items-center justify-center gap-2 hover:scale-105 transition-all" style={{background:"#27AE60"}}><CheckCircle size={20}/> Boîte {Math.min(curBox+1,5)}</button>
            </div>
          ):(
            <div className="h-16 flex items-center justify-center"><p className="text-white/30 text-xs">← Descendre | Monter →</p></div>
          )}
        </div>
      </div>
    );
  }

  if(view==="done") return(
    <div className="min-h-screen flex flex-col items-center justify-center p-6" style={{background:"linear-gradient(160deg,#0d1f35 0%,#1a2a4a 100%)"}}>
      <div className="w-full max-w-md text-center">
        <div className="text-6xl mb-4">🎯</div>
        <h2 className="text-white text-3xl font-black mb-2">Session terminée !</h2>
        <p className="text-blue-300 mb-2">{sessionDeck.length} cartes révisées</p>
        <p className="text-white/40 text-sm mb-8">Session #{state.session-1} complétée</p>
        <div className="bg-white/10 rounded-2xl p-4 mb-6">
          <div className="flex items-end justify-between gap-2 h-20 mb-2">
            {LEITNER_BOXES.map(b=>{const cnt=LEITNER_CARDS.filter(c=>(state.cards[c.id]?.box||1)===b.n).length;const h=Math.max(totalCards>0?(cnt/totalCards)*72:0,cnt>0?6:2);return(
              <div key={b.n} className="flex-1 flex flex-col items-center gap-1">
                <span className="text-white font-black text-sm">{cnt}</span>
                <div className="w-full rounded-t-lg" style={{height:h,background:b.color,opacity:cnt===0?0.2:1}}/>
              </div>
            );})}
          </div>
          <div className="flex justify-between">{LEITNER_BOXES.map(b=><p key={b.n} className="flex-1 text-center text-white/40 text-xs">B{b.n}</p>)}</div>
        </div>
        <button onClick={()=>setView("home")} className="w-full py-4 rounded-2xl text-white font-black bg-white/10 hover:bg-white/20 transition-all">← Retour aux boîtes</button>
      </div>
    </div>
  );
}

// ─── ROOT ───
function App() {
  const [screen,setScreen]=useState("home");
  const [category,setCategory]=useState(null);
  const [gameMode,setGameMode]=useState(null);
  const [playConfig,setPlayConfig]=useState(null);
  const [resultData,setResultData]=useState(null);
  const [retryDeck,setRetryDeck]=useState(null);
  const [user,setUser]=useState(null);
  const [authLoading,setAuthLoading]=useState(true);

  useEffect(()=>{
    const unsub=auth.onAuthStateChanged(async u=>{
      if(u){
        try{
          const snap=await db.ref(`users/${u.uid}/leitner_state`).once('value');
          const fbData=snap.val();
          if(fbData) localStorage.setItem('leitner_state',JSON.stringify(fbData));
        }catch(e){}
      }
      setUser(u);
      setAuthLoading(false);
    });
    return ()=>unsub();
  },[]);

  useEffect(()=>{ if(user) requestAndScheduleNotifications(); },[user]);

  if(authLoading) return <LoadingScreen/>;
  if(!user) return <LoginScreen/>;

  const goHome=()=>{setScreen("home");setCategory(null);setGameMode(null);setPlayConfig(null);setResultData(null);setRetryDeck(null);};

  if(screen==="home") return <HomeScreen user={user} onSelectMode={c=>{
    if(c==="leitner"){setScreen("leitner");return;}
    setCategory(c);setScreen("gamemode");
  }}/>;

  if(screen==="leitner") return <LeitnerScreen onBack={goHome}/>;

  if(screen==="gamemode") return <GameModeScreen category={category} onSelect={m=>{setGameMode(m);setScreen("setup");}} onBack={goHome}/>;

  if(screen==="setup"){
    const goBack=()=>setScreen("gamemode");
    const startPlay=cfg=>{setPlayConfig(cfg);setRetryDeck(null);setScreen("play");};
    if(category==="departements") return <SetupDept gameMode={gameMode} onStart={startPlay} onBack={goBack}/>;
    if(category==="capitales")    return <SetupCapitales gameMode={gameMode} onStart={startPlay} onBack={goBack}/>;
    if(category==="philo")        return <SetupPhilo gameMode={gameMode} onStart={startPlay} onBack={goBack}/>;
  }

  if(screen==="result") return <ResultScreen data={resultData} onRetry={d=>{setRetryDeck(d);setScreen("play");}} onHome={goHome}/>;

  if(screen==="play"){
    const k=retryDeck?"retry":"fresh";
    const cfg=playConfig;
    // Philo leçon → fiches
    if(cfg?.type==="philo"&&gameMode==="lesson")
      return <PhiloFicheScreen key={k} onBack={()=>setScreen("setup")} onEnd={d=>{setResultData(d);setScreen("result");}}/>;
    // Philo défi → flashcards 2 blocs
    if(cfg?.type==="philo"&&gameMode==="challenge")
      return <PhiloDefiScreen key={k} config={cfg} onBack={()=>setScreen("setup")} onEnd={d=>{setResultData(d);setScreen("result");}}/>;
    // Dept / Cap leçon
    if(gameMode==="lesson")
      return <LessonScreen key={k} config={cfg} onBack={()=>setScreen("setup")} onEnd={d=>{setResultData(d);setScreen("result");}}/>;
    // Dept / Cap défi
    return <ChallengeScreen key={k} config={cfg} onBack={()=>setScreen("setup")} onEnd={d=>{setResultData(d);setScreen("result");}}/>;
  }

  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
